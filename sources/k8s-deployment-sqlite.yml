# ===================================================
# KUBERNETES DEPLOYMENT: Seats Reservation System
# Database: PostgreSQL with PgBouncer
# ===================================================

---
# ===================================================
# 1. PERSISTENT VOLUME CLAIM - SQLite Database Storage
# ===================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-db-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---

# ===================================================
# 2. REDIS CACHE
# ===================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: default
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
spec:
  type: NodePort        # Force K8s open port to external host
  ports:
    - port: 6379        # Internal communication port between container in K8s
      targetPort: 6379  # Listen Port that Spring Boot Service is using
      nodePort: 32379   # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-cache
---

# ===================================================
# 3. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seats-reservation-config
  namespace: default
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  
  DATABASE_PROVIDER: "sqlite"             # postgres/sqlite
  REDIS_URL: "redis://redis-service:6379" # to K8s Service Redis
  AUTH_PROVIDER: "custom"                 # firebase/custom
  RESERVE_EXPIRY: "15"
  ACCESS_TOKEN_EXPIRY: "15"
  REFRESH_TOKEN_EXPIRY: "1"
  REDIS_TTL: "3"
  TOTAL_SEATS: "15"
  SHOULD_SEED: "true"                     # change to "false" after the first deployment for safe
  
  NEXT_PUBLIC_AUTH_PROVIDER: "custom"
  NEXT_PUBLIC_FIREBASE_API_KEY: "YOUR_FIREBASE_API_KEY"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "your-firebase-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "your-project.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-0000000000"
  NEXT_PUBLIC_FIREBASE_DB_URL: "https://your-project.firebaseio.com"
---

# ===================================================
# 4. RESOURCE SECRET: encrypt Base64
# ===================================================
apiVersion: v1
kind: Secret
metadata:
  name: seats-reservation-secret
  namespace: default
type: Opaque
data:
  # 💡 original: file:./seats.db
  DATABASE_URL: ZmlsZTouL3NlYXRzLmRi
  # original: k8s-seats-reservation-management-secret-key-2026-v1.0
  JWT_SECRET: azhzLXNlYXRzLXJlc2VydmF0aW9uLW1hbmFnZW1lbnQtc2VjcmV0LWtleS0yMDI2LXYxLjA= # encryped to base64
---

# ===================================================
# 5. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: default
spec:
  replicas: 1             # SQLite, only 1 replica to avoid data mismatch.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seats-reservation
  template:
    metadata:
      labels:
        app: seats-reservation
    spec:
      # depend on other services
      initContainers:
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      # container template
      containers:
      - name: seats-reservation-app
        image: seats-reservation-management:latest # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        
        # enviroment variables
        env:
          - name: DATABASE_PROVIDER
            value: "sqlite"
          - name: AUTH_PROVIDER
            value: "custom"
          - name: NEXT_PUBLIC_AUTH_PROVIDER
            value: "custom"
          - name: DATABASE_URL
            value: "file:/app/data/seats_reservation.db"
          - name: DIRECT_DATABASE_URL
            value: "file:/app/data/seats_reservation.db"
          - name: REDIS_URL
            value: "redis://redis-cache:6379"
          - name: JWT_SECRET
            value: "k8s-seats-reservation-sqlite-secret-key-2026"
          - name: TOTAL_SEATS
            value: "9"
          - name: SHOULD_SEED
            value: "true"
        
        # reference to configuration for environment variables
        envFrom:
        - configMapRef:
            name: seats-reservation-config
        - secretRef:
            name: seats-reservation-secret
        
        # CPU/Memory resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # health check
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # security
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001     # run by ID of user nextjs that had been created in Dockerfile
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # mount data
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/data
      
      # link volume PVC on Pod level
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-db-pvc
---

# ===================================================
# 6. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
  selector:
    app: seats-reservation
---

# ===================================================
# 7. APPLICATION SERVICE LOADBALANCER
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service-lb
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: seats-reservation
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
---

# ===================================================
# 8. NETWORK POLICY - Security
# ===================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seats-reservation-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: seats-reservation
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: redis-cache
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---

# ===================================================
# 9. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress
  namespace: default
  annotations:
    ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: seats-reservation-service
              port:
                number: 3000
