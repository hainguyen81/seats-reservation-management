name: seats-reservation-management

services:
  # ===================================================
  # 1. DATABASE
  # ===================================================
  postgres-db:
    image: postgres:15-alpine
    container_name: seats-reservation-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_pass
      POSTGRES_DB: seats_reservation
    ports:
      - "5432:5432"
    volumes:
      - pg_data_volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d seats_reservation"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - seats-reservation-network

  # ===================================================
  # 2. REDIS CACHE
  # ===================================================
  redis-cache:
    image: redis:7-alpine
    container_name: seats-redis-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - seats-reservation-network
  
  # ===================================================
  # 2.1. Webdis Gateway to change protocol/port from HTTP/80 to REDIS CACHE for Upstash Redis Rate Limiter
  # If not using, could register Upstash Account Free Tier for using Rate Limiter
  # ===================================================
  webdis-gateway:
    image: anapsix/webdis
    container_name: webdis-gateway
    ports:
      - "7379:7379"
    depends_on:
      redis-cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7379/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - seats-reservation-network

  # ===================================================
  # 3. NEXT.JS
  # ===================================================
  web-app:
    container_name: seats-reservation-app
    image: seats-reservation-management:latest
    build:
      context: ${BUILD_CONTEXT:-.}
      dockerfile: ${DOCKERFILE_PATH:-Dockerfile}
      args:
          - BUILD_MODE=${BUILD_MODE:-production}
          - DATABASE_PROVIDER=${DATABASE_PROVIDER:-postgres}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_PROVIDER=postgres
      - AUTH_PROVIDER=custom
      - NEXT_PUBLIC_AUTH_PROVIDER=custom
      - DATABASE_URL=postgresql://postgres:postgres_secret_pass@postgres-db:5432/seats_reservation?schema=public&pgbouncer=true
      - DIRECT_DATABASE_URL=postgresql://postgres:postgres_secret_pass@postgres-db:5432/seats_reservation?schema=public
      - REDIS_URL=redis://redis-cache:6379
      - JWT_SECRET=linkz-assessment-senior-lead-secret-key-2026
      - TOTAL_SEATS=15
      - SHOULD_SEED=false
      # LRU Rate Limiter
      - RAM_RATE_LIMITER=false
      - RAM_RATE_LIMIT_REQUESTS=5
      - RAM_RATE_LIMIT_TIMEOUT_PER_REQUEST=10
      # Upstash Rate Limiter
      - UPSTASH_RATE_LIMITER=true
      - UPSTASH_RATE_LIMIT_URL=http://localhost:7379
      - UPSTASH_RATE_LIMIT_TOKEN=
      - UPSTASH_RATE_LIMIT_REQUESTS=10
      - UPSTASH_RATE_LIMIT_TIMEOUT_PER_REQUEST=10
      # make docker console utf8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      webdis-gateway:
        condition: service_healthy
    networks:
      - seats-reservation-network

networks:
  seats-reservation-network:
    driver: bridge

volumes:
  pg_data_volume:
