# ===================================================
# 1. REDIS CACHE
# ===================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: default
spec:
  serviceName: "redis-service"
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
spec:
  ports:
  - port: 6379
  selector:
    app: redis-cache
---
# ===================================================
# 2. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seats-reservation-config
  namespace: default
data:
  DATABASE_PROVIDER: "postgres"           # postgres/sqlite
  REDIS_URL: "redis://redis-service:6379" # to K8s Service Redis
  AUTH_PROVIDER: "custom"                 # firebase/custom
  NEXT_PUBLIC_AUTH_PROVIDER: "custom"
  TOTAL_SEATS: "12"
  SHOULD_SEED: "true"                     # change to "false" after the first deployment for safe
  
---
# ===================================================
# 3. RESOURCE SECRET: encrypt Base64
# ===================================================
apiVersion: v1
kind: Secret
metadata:
  name: seats-reservation-secret
  namespace: default
type: Opaque
data:
  # 💡 original: postgresql://postgres:password123@pgbouncer-service:6432/seat_reservation?schema=public&pgbouncer=true
  DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBhc3N3b3JkMTIzQHBnYm91bmNlci1zZXJ2aWNlOjY0MzIvc2VhdF9yZXNlcnZhdGlvbj9zY2hlbWE9cHVibGljJnBnYm91bmNlcj10cnVl
  # 💡 original: postgresql://postgres:password123@postgres-service:5432/seat_reservation?schema=public
  DIRECT_DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBhc3N3b3JkMTIzQHBvc3RncmVzLXNlcnZpY2U6NTQzMi9zZWF0X3Jlc2VydmF0aW9uP3NjaGVtYT1wdWJsaWM=
  # original: linkz-assessment-senior-lead-secret-key-2026
  JWT_SECRET: bGlua3otYXNzZXNzbWVudC1zZW5pb3ItbGVhZC1zZWNyZXQta2V5LTIwMjY= # encryped to base64
---
# ===================================================
# 4. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: default
spec:
  replicas: 1 # SQLite, only 1 replica to avoid data mismatch.
  selector:
    matchLabels:
      app: seats-reservation
  template:
    metadata:
      labels:
        app: seats-reservation
    spec:
      containers:
      - name: seats-reservation-app
        image: seats-reservation-management:latest # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        
        # 💡 bypass enviroment from RESOURCE CONFIGMAP & SECRET
        env:
        - name: DATABASE_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: seats-reservation-config
              key: DATABASE_PROVIDER
        - name: AUTH_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: seats-reservation-config
              key: AUTH_PROVIDER
        - name: NEXT_PUBLIC_AUTH_PROVIDER
          valueFrom:
            configMapKeyRef:
              name: seats-reservation-config
              key: NEXT_PUBLIC_AUTH_PROVIDER
        - name: TOTAL_SEATS
          valueFrom:
            configMapKeyRef:
              name: seats-reservation-config
              key: TOTAL_SEATS
        - name: SHOULD_SEED
          valueFrom:
            configMapKeyRef:
              name: seats-reservation-config
              key: SHOULD_SEED
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: seats-reservation-config
              key: REDIS_URL
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: seats-reservation-secret
              key: DATABASE_URL
        - name: DIRECT_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: seats-reservation-secret
              key: DIRECT_DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: seats-reservation-secret
              key: JWT_SECRET
              
        # Health Check
        readinessProbe:
          httpGet:
            path: /api/seats
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
---
# ===================================================
# 5. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: seats-reservation
---
# ===================================================
# 6. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress
  namespace: default
  annotations:
    ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # configure cookie, CORS and Proxy header to accept JWT working properly
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        # Route prefix /seats-app to rewrite
        - path: /seats-app(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: seats-reservation-service
              port:
                number: 80
