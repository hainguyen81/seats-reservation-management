# ===================================================
# 1. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seat-reservation-config
  namespace: default
data:
  TOTAL_SEATS: "12"
  SHOULD_SEED: "false" # change to "false" after the first deployment for safe
---
# ===================================================
# 2. RESOURCE SECRET: encrypt Base64
# ===================================================
apiVersion: v1
kind: Secret
metadata:
  name: seat-reservation-secret
  namespace: default
type: Opaque
data:
  # original: file:./prisma/dev.db
  DATABASE_URL: ZmlsZTouL3ByaXNtYS9kZXYuZGI= # encryped to base64
  # original: linkz-assessment-senior-lead-secret-key-2026
  JWT_SECRET: bGlua3otYXNzZXNzbWVudC1zZW5pb3ItbGVhZC1zZWNyZXQta2V5LTIwMjY= # encryped to base64
---
# ===================================================
# 3. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seat-reservation-deployment
  namespace: default
spec:
  replicas: 1 # SQLite, only 1 replica to avoid data mismatch.
  selector:
    matchLabels:
      app: seat-reservation
  template:
    metadata:
      labels:
        app: seat-reservation
    spec:
      containers:
      - name: seat-reservation-app
        image: seats-reservation-management:latest # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        
        # 💡 bypass enviroment from RESOURCE CONFIGMAP & SECRET
        env:
        - name: TOTAL_SEATS
          valueFrom:
            configMapKeyRef:
              name: seat-reservation-config
              key: TOTAL_SEATS
        - name: SHOULD_SEED
          valueFrom:
            configMapKeyRef:
              name: seat-reservation-config
              key: SHOULD_SEED
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: seat-reservation-secret
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: seat-reservation-secret
              key: JWT_SECRET
              
        # Health Check
        readinessProbe:
          httpGet:
            path: /api/seats
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
---
# ===================================================
# 4. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seat-reservation-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: seat-reservation
---
# ===================================================
# 5. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seat-reservation-ingress
  namespace: default
  annotations:
    ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # configure cookie, CORS and Proxy header to accept JWT working properly
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        # Route prefix /seat-app to rewrite
        - path: /seat-app(/|$)(.*)
          pathType: ImplementationSpecific
          backend:
            service:
              name: seat-reservation-service
              port:
                number: 80
