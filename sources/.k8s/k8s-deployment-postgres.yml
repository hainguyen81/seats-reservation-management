# ===================================================
# KUBERNETES DEPLOYMENT: Seats Reservation System
# Database: PostgreSQL with PgBouncer
# ===================================================

---

# ===================================================
# 1. POSTGRESQL
# ===================================================
# Secret
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: default
type: Opaque
stringData:
  # 💡 original: postgres_secret_pass
  POSTGRES_PASSWORD: cG9zdGdyZXNfc2VjcmV0X3Bhc3M=

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres-db
  namespace: default
spec:
  serviceName: postgres-service
  replicas: 1
  selector:
    matchLabels:
      app: postgres-db
  template:
    metadata:
      labels:
        app: postgres-db
    spec:
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: seats_reservation
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U postgres
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  type: NodePort        # Force K8s open port to external host
  ports:
    - port: 5432        # Internal communication port between container in K8s
      targetPort: 5432  # Listen Port that Spring Boot Service is using
      nodePort: 32133   # Port for external host. Valid range: 30000-32767
  selector:
    app: postgres-db
---

# ===================================================
# 2. REDIS CACHE
# ===================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: default
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
spec:
  type: NodePort        # Force K8s open port to external host
  ports:
    - port: 6379        # Internal communication port between container in K8s
      targetPort: 6379  # Listen Port that Spring Boot Service is using
      nodePort: 32379   # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-cache
---

# ===================================================
# 3. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seats-reservation-config
  namespace: default
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  
  DATABASE_PROVIDER: "postgres"           # postgres/sqlite
  REDIS_URL: "redis://redis-service:6379" # to K8s Service Redis
  AUTH_PROVIDER: "custom"                 # firebase/custom
  RESERVE_EXPIRY: "15"
  ACCESS_TOKEN_EXPIRY: "15"
  REFRESH_TOKEN_EXPIRY: "1"
  REDIS_TTL: "3"
  TOTAL_SEATS: "15"
  SHOULD_SEED: "true"                     # change to "false" after the first deployment for safe
  
  NEXT_PUBLIC_AUTH_PROVIDER: "custom"
  NEXT_PUBLIC_FIREBASE_API_KEY: "YOUR_FIREBASE_API_KEY"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "your-firebase-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "your-project.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-0000000000"
  NEXT_PUBLIC_FIREBASE_DB_URL: "https://your-project.firebaseio.com"
---

# ===================================================
