  namespace: default
type: Opaque
data:
  # 💡 original: postgresql://postgres:postgres_secret_pass@postgres-service:5432/seats_reservation?schema=public&pgbouncer=true
  DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBvc3RncmVzX3NlY3JldF9wYXNzQHBvc3RncmVzLXNlcnZpY2U6NTQzMi9zZWF0c19yZXNlcnZhdGlvbj9zY2hlbWE9cHVibGljJnBnYm91bmNlcj10cnVl
  # 💡 original: postgresql://postgres:password123@postgres-service:5432/seats_reservation?schema=public
  DIRECT_DATABASE_URL: cG9zdGdyZXNxbDovL3Bvc3RncmVzOnBvc3RncmVzX3NlY3JldF9wYXNzQHBvc3RncmVzLXNlcnZpY2U6NTQzMi9zZWF0c19yZXNlcnZhdGlvbj9zY2hlbWE9cHVibGlj
  # original: k8s-seats-reservation-management-secret-key-2026-v1.0
  JWT_SECRET: azhzLXNlYXRzLXJlc2VydmF0aW9uLW1hbmFnZW1lbnQtc2VjcmV0LWtleS0yMDI2LXYxLjA= # encryped to base64
---

# ===================================================
# 5. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: default
spec:
  replicas: 2             # SQLite, only 1 replica to avoid data mismatch.
  selector:
    matchLabels:
      app: seats-reservation
  template:
    metadata:
      labels:
        app: seats-reservation
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - seats-reservation
              topologyKey: kubernetes.io/hostname
      
      # depend on other services
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done']
      
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      # container template
      containers:
      - name: seats-reservation-app
        image: seats-reservation-management:latest # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000     # Next.js port that is running
        
        # enviroment variables
        env:
          - name: DATABASE_PROVIDER
            value: "postgres"
          - name: AUTH_PROVIDER
            value: "custom"
          - name: NEXT_PUBLIC_AUTH_PROVIDER
            value: "custom"
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: seats-reservation-secret      # Secret Variable
                key: DATABASE_URL                   # Secret Variable Value
          - name: DIRECT_DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: seats-reservation-secret      # Secret Variable
                key: DIRECT_DATABASE_URL            # Secret Variable Value
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: seats-reservation-secret      # Secret Variable
                key: JWT_SECRET                     # Secret Variable Value
          - name: REDIS_URL
            value: "redis://redis-cache:6379"
          - name: TOTAL_SEATS
            value: "9"
          - name: SHOULD_SEED
            value: "true"
        
        # reference to configuration for environment variables
        envFrom:
        - configMapRef:
            name: seats-reservation-config
        - secretRef:
            name: seats-reservation-secret
        
        # CPU/Memory resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # health check
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000          # Next.js port that is running
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000          # Next.js port that is running
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # security
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001     # run by ID of user nextjs that had been created in Dockerfile
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
---

# ===================================================
# 6. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 4000          # port open for K8s Ingress calling to
    targetPort: 3000    # real port that Next.js listening in container
  selector:
    app: seats-reservation
---

# ===================================================
# 7. APPLICATION SERVICE LOADBALANCER
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service-lb
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: seats-reservation
  ports:
  - port: 4000        # public port on browser (Ex: http://localhost:4000)
    targetPort: 3000  # real port that Next.js listening in container
    protocol: TCP
---

# ===================================================
# 8. HORIZONTAL POD AUTOSCALER
# ===================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seats-reservation-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seats-reservation-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---

# ===================================================
# 9. NETWORK POLICY - Security
# ===================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seats-reservation-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: seats-reservation
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}     # 🔓 Allow all internal Ingress Controller (including Docker Desktop) calling into
  egress:
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Postgres and Redis in namespace
    ports:
    - protocol: TCP
      port: 5432          # Port Postgres
    - protocol: TCP
      port: 6379          # Port Redis
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---

# ===================================================
# 10. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress
  namespace: default
  annotations:
    ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Ingress call health check web-app
    nginx.ingress.kubernetes.io/healthcheck-path: "/api/health"
    # # for GCP/GKE
    # ://google.com: '{"default": "seats-backend-config"}'
    # ://google.com: '{"default": "seats-backend-config"}'
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              # 🌟 point Service LoadBalancer to Docker Desktop map out to localhost
              name: seats-reservation-service-lb
              port:
                number: 4000    # new port (from 3000 to 4000) for Ingress calling to
