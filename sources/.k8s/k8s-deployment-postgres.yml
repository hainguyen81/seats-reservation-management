---
# ===================================================
# 5. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: default
spec:
  replicas: 2             # SQLite, only 1 replica to avoid data mismatch.
  selector:
    matchLabels:
      app: seats-reservation-postgres
  template:
    metadata:
      labels:
        app: seats-reservation-postgres
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - seats-reservation
              topologyKey: kubernetes.io/hostname
      
      # depend on other services
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z postgres-service 5432; do echo waiting for postgres; sleep 2; done']
      
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      - name: wait-for-webdis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z webdis-service 7379; do echo waiting for webdis; sleep 2; done']
      
      # container template
      containers:
      - name: seats-reservation-app
        image: seats-reservation-management:latest # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000     # Next.js port that is running
        
        # reference to configuration for environment variables
        envFrom:
        - configMapRef:
            name: seats-reservation-config
        # declare secrets after config to override if necessary
        - secretRef:
            name: seats-reservation-secret
        
        # CPU/Memory resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # health check
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000          # Next.js port that is running
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000          # Next.js port that is running
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # security
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001     # run by ID of user nextjs that had been created in Dockerfile
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
# ===================================================
# 6. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 4000          # port open for K8s Ingress calling to
    targetPort: 3000    # real port that Next.js listening in container
  selector:
    app: seats-reservation-postgres

---
# ===================================================
# 7. APPLICATION SERVICE LOADBALANCER
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service-lb
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: seats-reservation-postgres
  ports:
  - port: 4000        # port open for K8s Ingress calling to
    targetPort: 3000  # real port that Next.js listening in container
    protocol: TCP

---
# ===================================================
# 8. NETWORK POLICY - Security
# ===================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seats-reservation-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: seats-reservation-postgres
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}     # 🔓 Allow all internal Ingress Controller (including Docker Desktop) calling into
  egress:
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Postgres in namespace
    ports:
    - protocol: TCP
      port: 5432          # Port Postgres
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Redis in namespace
    ports:
    - protocol: TCP
      port: 6379          # Port Redis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Webdis in namespace
    ports:
    - protocol: TCP
      port: 7379          # Port Webdis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Next.js in namespace
    ports:
    - protocol: TCP
      port: 3000          # Port Next.js
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
# ===================================================
# 9. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress
  namespace: default
  annotations:
    ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Ingress call health check web-app
    nginx.ingress.kubernetes.io/healthcheck-path: "/api/health"
    
    # 🔥 ANTI-SPOOFING RADAR: Force Nginx to pass the real edge client IP down to backend pods
    nginx.ingress.kubernetes.io/enable-real-ip: "true"
    
    # =========================================================================
    # 🎛️ VOLUMETRIC PERIMETER PROTECTION CEILING [3.2]
    # =========================================================================
    # Aggressive global boundary: Allow max 30 requests per second (30r/s) per unique IP
    nginx.ingress.kubernetes.io/limit-rps: "$(NGINX_LIMIT_RPS)"
    # Burst cushion buffer: Allow 10 extra requests to queue up before hard dropping
    nginx.ingress.kubernetes.io/limit-burst: "$(NGINX_LIMIT_BURST)"
    # Fail-fast setting: Drop over-quota packets instantly with HTTP 429
    nginx.ingress.kubernetes.io/limit-delay: "$(NGINX_LIMIT_DELAY)"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              # 🌟 point Service LoadBalancer to Docker Desktop map out to localhost
              name: seats-reservation-service-lb
              port:
                number: 4000    # new port (from 3000 to 4000) for Ingress calling to

---
# ===================================================
# 10. HORIZONTAL POD AUTOSCALER
# ===================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seats-reservation-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: seats-reservation-deployment
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80