# ===================================================
# KUBERNETES DEPLOYMENT: Seats Reservation System
# Database: SQLite
# ===================================================

---

# ===================================================
# 1. PERSISTENT VOLUME CLAIM - SQLite Database Storage
# ===================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-db-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ===================================================
# 2. REDIS CACHE
# ===================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: default
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: default
spec:
  type: NodePort        # Force K8s open port to external host
  ports:
    - port: 6379        # Internal communication port between container in K8s
      targetPort: 6379  # Listen Port that Spring Boot Service is using
      nodePort: 32379   # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-cache

---
# ===================================================
# 2.1 WEBDIS-REDIS
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-webdis
  namespace: default
spec:
  serviceName: webdis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-webdis
  template:
    metadata:
      labels:
        app: redis-webdis
    spec:
      containers:
      - name: webdis-gateway
        image: anapsix/webdis
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7379
          name: webdis
        env:
        - REDIS_HOST=redis-service
        - REDIS_PORT=6379
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -f http://localhost:7379/ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -f http://localhost:7379/ping
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: webdis-service
  namespace: default
spec:
  type: NodePort        # Force K8s open port to external host
  ports:
    - protocol: TCP
      port: 7379        # Internal communication port between container in K8s
      targetPort: 7379  # Listen Port that Spring Boot Service is using
      nodePort: 32479   # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-webdis

---
# ===================================================
# 3. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seats-reservation-config
  namespace: default
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  
  DATABASE_PROVIDER: "sqlite"             # postgres/sqlite
  AUTH_PROVIDER: "custom"                 # firebase/custom
  RESERVE_EXPIRY: "15"
  ACCESS_TOKEN_EXPIRY: "15"
  REFRESH_TOKEN_EXPIRY: "1"
  
  NEXT_PUBLIC_AUTH_PROVIDER: "custom"
  NEXT_PUBLIC_FIREBASE_API_KEY: "YOUR_FIREBASE_API_KEY"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "your-firebase-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "your-project.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-0000000000"
  NEXT_PUBLIC_FIREBASE_DB_URL: "https://your-project.firebaseio.com"
  
  # Redis Cache
  REDIS_URL: "redis://redis-cache:6379" # to K8s Service Redis
  REDIS_TTL: "3"
  REDIS_RETIES_PER_REQUEST: "1"
  REDIS_CONN_TIMEOUT: "2000" # in seconds
  # LRU Rate Limiter
  RAM_RATE_LIMITER: "false"
  RAM_RATE_LIMIT_REQUESTS: "5"
  RAM_RATE_LIMIT_TIMEOUT_PER_REQUEST: "10"
  # Upstash Rate Limiter
  UPSTASH_RATE_LIMITER: "true"
  UPSTASH_RATE_LIMIT_URL: "http://webdis-gateway:7379"  # to K8s Service Webdis
  UPSTASH_RATE_LIMIT_TOKEN: ""
  UPSTASH_RATE_LIMIT_REQUESTS: "10"
  UPSTASH_RATE_LIMIT_TIMEOUT_PER_REQUEST: "10"
  
  # Sample data
  TOTAL_SEATS: "9"
  SHOULD_SEED: "true"                     # change to "false" after the first deployment for safe

---
# ===================================================
# 4. RESOURCE SECRET: encrypt Base64
# ===================================================
apiVersion: v1
kind: Secret
metadata:
  name: seats-reservation-secret
  namespace: default
type: Opaque
data:
  # 💡 original: file:./app/prisma/data/seats-reservation.db?connection_limit=1&socket_timeout=30
  DATABASE_URL: ZmlsZTouL2FwcC9wcmlzbWEvZGF0YS9zZWF0cy1yZXNlcnZhdGlvbi5kYj9jb25uZWN0aW9uX2xpbWl0PTEmc29ja2V0X3RpbWVvdXQ9MzA=
  # 💡 original: file:./app/prisma/data/seats-reservation.db?connection_limit=1&socket_timeout=30
  DIRECT_DATABASE_URL: ZmlsZTouL2FwcC9wcmlzbWEvZGF0YS9zZWF0cy1yZXNlcnZhdGlvbi5kYj9jb25uZWN0aW9uX2xpbWl0PTEmc29ja2V0X3RpbWVvdXQ9MzA=
  # original: k8s-seats-reservation-management-secret-key-2026-v1.0
  JWT_SECRET: azhzLXNlYXRzLXJlc2VydmF0aW9uLW1hbmFnZW1lbnQtc2VjcmV0LWtleS0yMDI2LXYxLjA= # encryped to base64
---

# ===================================================
# 5. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: default
spec:
  replicas: 1             # SQLite, only 1 replica to avoid data mismatch.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seats-reservation-sqlite
  template:
    metadata:
      labels:
        app: seats-reservation-sqlite
    spec:
      # depend on other services
      initContainers:
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      - name: wait-for-webdis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z webdis-service 7379; do echo waiting for webdis; sleep 2; done']
      
      # container template
      containers:
      - name: seats-reservation-app
        image: seats-reservation-management:latest # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        
        # reference to configuration for environment variables
        envFrom:
        - configMapRef:
            name: seats-reservation-config
        - secretRef:
            name: seats-reservation-secret
        
        # CPU/Memory resources
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        # health check
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # security
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001     # run by ID of user nextjs that had been created in Dockerfile
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # mount data
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/prisma/data
      
      # link volume PVC on Pod level
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-db-pvc
---

# ===================================================
# 6. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: seats-reservation-sqlite
  ports:
  - port: 3000          # port open for K8s Ingress calling to
    targetPort: 3000    # real port that Next.js listening in container
---

# ===================================================
# 7. APPLICATION SERVICE LOADBALANCER
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service-lb
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: seats-reservation-sqlite
  ports:
  - port: 3000        # port open for K8s Ingress calling to
    targetPort: 3000  # real port that Next.js listening in container
    protocol: TCP
---

# ===================================================
# 8. NETWORK POLICY - Security
# ===================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seats-reservation-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: seats-reservation-sqlite
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}     # 🔓 Allow all internal Ingress Controller calling into
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}     # 🔓 Allow all internal Ingress Controller (including Docker Desktop) calling into
  egress:
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Redis in namespace
    ports:
    - protocol: TCP
      port: 6379          # Port Redis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Webdis in namespace
    ports:
    - protocol: TCP
      port: 7379          # Port Webdis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Next.js in namespace
    ports:
    - protocol: TCP
      port: 3000          # Port Next.js
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---

# ===================================================
# 9. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress
  namespace: default
  annotations:
    ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Ingress call health check web-app
    nginx.ingress.kubernetes.io/healthcheck-path: "/api/health"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              # 🌟 point Service LoadBalancer to Docker Desktop map out to localhost
              name: seats-reservation-service-lb
              port:
                number: 3000
