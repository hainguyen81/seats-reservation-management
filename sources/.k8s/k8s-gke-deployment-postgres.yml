# ===================================================
# 4. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: gke-seats-reservation-postgres
spec:
  replicas: 2             # SQLite, only 1 replica to avoid data mismatch.
  selector:
    matchLabels:
      app: seats-reservation-postgres
  template:
    metadata:
      labels:
        app: seats-reservation-postgres
    spec:
      # Specify GCP Service Account for pulling image on GCP Repository
      serviceAccountName: PLACEHOLDER_GCP_SERVICE_ACCOUNT_RUNNER
      
      # affinity
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - seats-reservation
              topologyKey: kubernetes.io/hostname
      
      # depend on other services
      initContainers:
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      - name: wait-for-webdis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z webdis-service 7379; do echo waiting for webdis; sleep 2; done']
      
      # container template
      containers:
      - name: seats-reservation-postgres-app
        image: PLACEHOLDER_GKE_REGISTRY_IMAGE       # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000     # Next.js port that is running
        
        # reference to configuration for environment variables
        envFrom:
        - configMapRef:
            name: seats-reservation-config
        # declare secrets after config to override if necessary
        - secretRef:
            name: seats-reservation-secret
        
        # CPU/Memory resources
        resources:
          # requests:
          #   memory: "512Mi"
          #   cpu: "500m"
          # limits:
          #   memory: "1Gi"
          #   cpu: "1000m"
          # -------------------------------------------------
          # use this to reduce GKE resource in Free Tier when testing high requests, scalability test
          # -------------------------------------------------
          requests:
            cpu: "100m"       # 10% CPU when Node start
            memory: "128Mi"   # 128MB RAM
          limits:
            cpu: "300m"      # allow maximum 30% CPU when k6 shoot requests
            memory: "256Mi"  # limit hardware to 256MB RAM to avoid Out-Of-Memory (OOMKilled)
        
        # health check
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000          # Next.js port that is running
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000          # Next.js port that is running
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # security
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001     # run by ID of user nextjs that had been created in Dockerfile
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

---
# ===================================================
# 5. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: gke-seats-reservation-postgres
  annotations:
    # This critical line allows ClusterIP to pair with GKE Ingress
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  ports:
  - port: 80            # port open for K8s Ingress calling to
    targetPort: 3000    # real port that Next.js listening in container
    protocol: TCP
  selector:
    app: seats-reservation-postgres

---
# ===================================================
# 6. APPLICATION SERVICE LOADBALANCER
# !!!IMPORTANT!!! Require LoadBalancer to publish INTERNET/EXTERNAL
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service-lb
  namespace: gke-seats-reservation-postgres
  annotations:
    # This critical line allows ClusterIP to pair with GKE Ingress
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: LoadBalancer
  ports:
  - port: 80            # port open for K8s Ingress calling to
    targetPort: 3000    # real port that Next.js listening in container
    protocol: TCP
  selector:
    app: seats-reservation-postgres

---
# ===================================================
# 7. NETWORK POLICY - Security
# ===================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seats-reservation-netpol
  namespace: gke-seats-reservation-postgres
spec:
  podSelector:
    matchLabels:
      app: seats-reservation-postgres
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}     # 🔓 Allow all internal Ingress Controller (including Docker Desktop) calling into
  egress:
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Redis in namespace
    ports:
    - protocol: TCP
      port: 6379          # Port Redis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Webdis in namespace
    ports:
    - protocol: TCP
      port: 7379          # Port Webdis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Next.js in namespace
    ports:
    - protocol: TCP
      port: 3000          # Port Next.js
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: TCP
      port: 80
    - protocol: UDP
      port: 53

---
# ===================================================
# 8. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress-postgres
  namespace: gke-seats-reservation-postgres
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Ingress call health check web-app
    nginx.ingress.kubernetes.io/healthcheck-path: "/api/health"
    
    # 🔥 ANTI-SPOOFING RADAR: Force Nginx to pass the real edge client IP down to backend pods
    nginx.ingress.kubernetes.io/enable-real-ip: "true"
    
    # =========================================================================
    # 🎛️ VOLUMETRIC PERIMETER PROTECTION CEILING [3.2]
    # =========================================================================
    # Aggressive global boundary: Allow max 30 requests per second (30r/s) per unique IP
    nginx.ingress.kubernetes.io/limit-rps: "$(NGINX_LIMIT_RPS)"
    # Burst cushion buffer: Allow 10 extra requests to queue up before hard dropping
    nginx.ingress.kubernetes.io/limit-burst: "$(NGINX_LIMIT_BURST)"
    # Fail-fast setting: Drop over-quota packets instantly with HTTP 429
    nginx.ingress.kubernetes.io/limit-delay: "$(NGINX_LIMIT_DELAY)"
spec:
  # Use "gce" for external HTTP(S) LB or "gce-internal" for internal HTTP(S) LB
  ingressClassName: gce
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              # 🌟 point LoadBalancer Service
              name: seats-reservation-service-lb
              port:
                number: 80    # LoadBalancer Service (`seats-reservation-service-lb`) Port for Ingress calling to

---
# ===================================================
# 9. HORIZONTAL POD AUTOSCALER
# ===================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: seats-reservation-hpa
  namespace: gke-seats-reservation-postgres
spec:
  scaleTargetRef:
    apiVersion: v1
    kind: Deployment
    name: seats-reservation-deployment      # Name of Next.js deployment to scale
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
