# ===================================================
# KUBERNETES DEPLOYMENT: Seats Reservation System
# Database: PostgreSQL with PgBouncer
# ===================================================

---
# ===================================================
# 1. REDIS CACHE
# ===================================================
apiVersion: v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: gke-seats-reservation-postgres
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: gke-seats-reservation-postgres
spec:
  type: ClusterIP       # or NodePort but dont specify nodePort, because it will conflict with SQLite
  ports:
    - port: 6379        # Internal communication port between container in K8s
      targetPort: 6379  # Listen Port that Spring Boot Service is using
      # nodePort: 32379 # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-cache

---
# ===================================================
# 1.1 WEBDIS-REDIS
# ===================================================
apiVersion: v1
kind: Deployment
metadata:
  name: redis-webdis
  namespace: gke-seats-reservation-postgres
spec:
  serviceName: webdis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-webdis
  template:
    metadata:
      labels:
        app: redis-webdis
    spec:
      containers:
      - name: webdis-gateway
        image: anapsix/webdis
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7379
          name: webdis
        env:
        - REDIS_HOST=redis-service
        - REDIS_PORT=6379
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -f http://localhost:7379/ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - curl -f http://localhost:7379/ping
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: webdis-service
  namespace: gke-seats-reservation-postgres
spec:
  type: ClusterIP       # or NodePort but dont specify nodePort, because it will conflict with SQLite
  ports:
    - protocol: TCP
      port: 7379        # Internal communication port between container in K8s
      targetPort: 7379  # Listen Port that Spring Boot Service is using
      # nodePort: 32379 # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-webdis

---
# ===================================================
# 2. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seats-reservation-config
  namespace: gke-seats-reservation-postgres
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  
  DATABASE_PROVIDER: "postgres"           # postgres/sqlite
  AUTH_PROVIDER: "custom"                 # firebase/custom
  RESERVE_EXPIRY: "15"
  ACCESS_TOKEN_EXPIRY: "15"
  REFRESH_TOKEN_EXPIRY: "1"
  
  NEXT_PUBLIC_AUTH_PROVIDER: "custom"
  NEXT_PUBLIC_FIREBASE_API_KEY: "YOUR_FIREBASE_API_KEY"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "your-firebase-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "your-project.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-0000000000"
  NEXT_PUBLIC_FIREBASE_DB_URL: "https://your-project.firebaseio.com"
  
  # Redis Cache
  REDIS_URL: "redis://redis-cache:6379" # to K8s Service Redis
  REDIS_TTL: "3"
  REDIS_RETIES_PER_REQUEST: "1"
  REDIS_CONN_TIMEOUT: "2000" # in seconds
  # LRU Rate Limiter
  RAM_RATE_LIMITER: "false"
  RAM_RATE_LIMIT_REQUESTS: "5"
  RAM_RATE_LIMIT_TIMEOUT_PER_REQUEST: "10"
  # Upstash Rate Limiter
  UPSTASH_RATE_LIMITER: "true"
  UPSTASH_RATE_LIMIT_URL: "http://webdis-gateway:7379"  # to K8s Service Webdis
  UPSTASH_RATE_LIMIT_TOKEN: ""
  UPSTASH_RATE_LIMIT_REQUESTS: "10"
  UPSTASH_RATE_LIMIT_TIMEOUT_PER_REQUEST: "10"
  
  # Sample data
  TOTAL_SEATS: "9"
  SHOULD_SEED: "true"                     # change to "false" after the first deployment for safe

---
