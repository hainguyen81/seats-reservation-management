# ===================================================
# KUBERNETES DEPLOYMENT: Seats Reservation System
# Database: PostgreSQL with PgBouncer
# !!!NOTE!!! No need LoadBalancer, due to using GKE Cloud LoadBalancer
# ===================================================

---
# ===================================================
# 1. PERSISTENT VOLUME CLAIM - SQLite Database Storage
# ===================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlite-db-pvc
  namespace: gke-seats-reservation-sqlite
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
# ===================================================
# 2. REDIS CACHE
# ===================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-cache
  namespace: gke-seats-reservation-sqlite
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis-cache
  template:
    metadata:
      labels:
        app: redis-cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: gke-seats-reservation-sqlite
spec:
  type: ClusterIP       # or NodePort but dont specify nodePort, because it will conflict with SQLite
  ports:
    - port: 6379        # Internal communication port between container in K8s
      targetPort: 6379  # Listen Port that Spring Boot Service is using
      # nodePort: 32379 # Port for external host. Valid range: 30000-32767
  selector:
    app: redis-cache

---
# ===================================================
# 3. RESOURCE CONFIGMAP
# ===================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: seats-reservation-config
  namespace: gke-seats-reservation-sqlite
data:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"
  
  DATABASE_PROVIDER: "sqlite"             # postgres/sqlite
  REDIS_URL: "redis://redis-service:6379" # to K8s Service Redis
  AUTH_PROVIDER: "custom"                 # firebase/custom
  RESERVE_EXPIRY: "15"
  ACCESS_TOKEN_EXPIRY: "15"
  REFRESH_TOKEN_EXPIRY: "1"
  REDIS_TTL: "3"
  TOTAL_SEATS: "15"
  SHOULD_SEED: "true"                     # change to "false" after the first deployment for safe
  
  NEXT_PUBLIC_AUTH_PROVIDER: "custom"
  NEXT_PUBLIC_FIREBASE_API_KEY: "YOUR_FIREBASE_API_KEY"
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "your-project.firebaseapp.com"
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: "your-firebase-project-id"
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "your-project.appspot.com"
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
  NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-0000000000"
  NEXT_PUBLIC_FIREBASE_DB_URL: "https://your-project.firebaseio.com"

---
# ===================================================
# 4. RESOURCE SECRET: encrypt Base64
# ===================================================
apiVersion: v1
kind: Secret
metadata:
  name: seats-reservation-secret
  namespace: gke-seats-reservation-sqlite
type: Opaque
data:
  # 💡 original: file:./app/prisma/data/seats-reservation.db
  DATABASE_URL: ZmlsZTouL2FwcC9wcmlzbWEvZGF0YS9zZWF0cy1yZXNlcnZhdGlvbi5kYg==
  # original: k8s-seats-reservation-management-secret-key-2026-v1.0
  JWT_SECRET: azhzLXNlYXRzLXJlc2VydmF0aW9uLW1hbmFnZW1lbnQtc2VjcmV0LWtleS0yMDI2LXYxLjA= # encryped to base64

---
# ===================================================
# 5. RESOURCE DEPLOYMENT: Manage Pod is running Next.js
# ===================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seats-reservation-deployment
  namespace: gke-seats-reservation-sqlite
spec:
  replicas: 1             # SQLite, only 1 replica to avoid data mismatch.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: seats-reservation-sqlite
  template:
    metadata:
      labels:
        app: seats-reservation-sqlite
    spec:
      # Specify GCP Service Account for pulling image on GCP Repository
      serviceAccountName: PLACEHOLDER_GCP_SERVICE_ACCOUNT_RUNNER
      
      # depend on other services
      initContainers:
      - name: wait-for-redis
        image: busybox:1.28
        command: ['sh', '-c', 'until nc -z redis-service 6379; do echo waiting for redis; sleep 2; done']
      
      # container template
      containers:
      - name: seats-reservation-sqlite-app
        image: PLACEHOLDER_GKE_REGISTRY_IMAGE     # Docker Hub/Registry Image
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        
        # enviroment variables
        env:
          - name: DATABASE_PROVIDER
            value: "sqlite"
          - name: AUTH_PROVIDER
            value: "custom"
          - name: NEXT_PUBLIC_AUTH_PROVIDER
            value: "custom"
          - name: DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: seats-reservation-secret      # Secret Variable
                key: DATABASE_URL                   # Secret Variable Value
          - name: DIRECT_DATABASE_URL
            valueFrom:
              secretKeyRef:
                name: seats-reservation-secret      # Secret Variable
                key: DATABASE_URL                   # Secret Variable Value
          - name: JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: seats-reservation-secret      # Secret Variable
                key: JWT_SECRET                     # Secret Variable Value
          - name: REDIS_URL
            value: "redis://redis-cache:6379"
          - name: TOTAL_SEATS
            value: "9"
          - name: SHOULD_SEED
            value: "true"
        
        # reference to configuration for environment variables
        envFrom:
        - configMapRef:
            name: seats-reservation-config
        - secretRef:
            name: seats-reservation-secret
        
        # CPU/Memory resources
        resources:
          # requests:
          #   memory: "512Mi"
          #   cpu: "500m"
          # limits:
          #   memory: "1Gi"
          #   cpu: "1000m"
          # -------------------------------------------------
          # use this to reduce GKE resource in Free Tier when testing high requests, scalability test
          # -------------------------------------------------
          requests:
            cpu: "100m"       # 10% CPU when Node start
            memory: "128Mi"   # 128MB RAM
          limits:
            cpu: "300m"      # allow maximum 30% CPU when k6 shoot requests
            memory: "256Mi"  # limit hardware to 256MB RAM to avoid Out-Of-Memory (OOMKilled)
        
        # health check
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # security
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001     # run by ID of user nextjs that had been created in Dockerfile
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        
        # mount data
        volumeMounts:
        - name: sqlite-storage
          mountPath: /app/prisma/data
      
      # link volume PVC on Pod level
      volumes:
      - name: sqlite-storage
        persistentVolumeClaim:
          claimName: sqlite-db-pvc

---
# ===================================================
# 6. RESOURCE SERVICE: Internal Network (ClusterIP)
# ===================================================
apiVersion: v1
kind: Service
metadata:
  name: seats-reservation-service
  namespace: gke-seats-reservation-sqlite
  annotations:
    # This critical line allows ClusterIP to pair with GKE Ingress
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  ports:
  - port: 80            # port open for K8s Ingress calling to
    targetPort: 3000    # real port that Next.js listening in container
  selector:
    app: seats-reservation-sqlite

---
# ===================================================
# 7. NETWORK POLICY - Security
# ===================================================
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: seats-reservation-netpol
  namespace: gke-seats-reservation-sqlite
spec:
  podSelector:
    matchLabels:
      app: seats-reservation-sqlite
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}     # 🔓 Allow all internal Ingress Controller (including Docker Desktop) calling into
  egress:
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Redis in namespace
    ports:
    - protocol: TCP
      port: 6379          # Port Redis
  - to:
    - podSelector: {}     # 🔓 Allow all Pod Next.js in namespace
    ports:
    - protocol: TCP
      port: 3000          # Port Next.js
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: TCP
      port: 80
    - protocol: UDP
      port: 53

---
# ===================================================
# 8. RESOURCE INGRESS: Traffic Router from external
# ===================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: seats-reservation-ingress
  namespace: gke-seats-reservation-postgres
spec:
  # Use "gce" for external HTTP(S) LB or "gce-internal" for internal HTTP(S) LB
  ingressClassName: gce
  rules:
  - http:
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              # 🌟 point ClusterIP Service (no need to use LoadBalancer, due to using GKE Cloud LoadBalancer)
              name: seats-reservation-service
              port:
                number: 80    # ClusterIP Service (`seats-reservation-service`) Port for Ingress calling to
