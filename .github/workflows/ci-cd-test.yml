name: 🚀 [ TEST ] Seats Reservation Platform CI/CD Pipeline

on:
  # auto trigger workflow
  push:
    branches: [ "master" ] # active when merge code into master
    # only triggered when pushing *.js/*.ts/*.tsx
    paths: [ "**/*.js", "**/*.ts", "**/*.tsx" ]
  pull_request:
    # only triggered when pushing *.js/*.ts/*.tsx
    paths: [ "**/*.js", "**/*.ts", "**/*.tsx" ]
  # manual trigger workflow
  workflow_dispatch:

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

# jobs
jobs:
  # ===================================================
  # 📋 REGRESSION & AUTOMATION E2E TEST (CI) - POSTGRES
  # ===================================================
  postgres-e2e-test:
    name: 🚀 [ PostgreSQL ] Automated Playwright E2E Verification
    runs-on: ubuntu-latest

    services:
      # redis
      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379

      # postgres
      postgres-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secret_pass
          POSTGRES_DB: seats_reservation
        ports:
          - 5432:5432
        # health check
        options: >-
          --health-cmd "pg_isready -U postgres -d seat_reservation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Check out repository code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      if: success()                 # if previous step is successful
      uses: actions/setup-node@v4
      with:
        node-version: 22.14
        # cache: 'npm'

    - name: 📦 Install Package Dependencies
      if: success()                 # if previous step is successful
      # run: npm ci
      run: |
        cd sources
        npm ci
        npm install @esbuild/linux-x64 --save-optional

    # ==============================================================================
    # !!!IMPORTANT!!! GitHub CI/CD could not found the `postgres-db:5432` by service name because CI/CD is external
    # It could not found `postgres-db`, so using `localhost:5432` to access from external host
    # 💡 Core Rule to Avoid Future Confusion:
    # - When running with Docker Compose (Local Machine or Production Environment):
    #   Containers share an isolated, internal Docker virtual network.
    #   Therefore, you must use the service name as the hostname (e.g., redis://redis-cache:6379).
    # - When running commands directly from a GitHub Actions Workflow:
    #   Commands execute directly on the host runner (outside the container network) and communicate through mapped ports.
    #   Consequently, all backing services (postgres, redis, mongodb, etc.) must be accessed via localhost.
    # ==============================================================================
    - name: 🔌 Generate Prisma Client & Sync Database Schema & 🌱 Seed Sample Data
      if: success()                 # if previous step is successful
      run: |
        cd sources
        cp tsconfig.prod.json tsconfig.json
        # build prisma
        cp prisma/schema.postgres.prisma prisma/schema.prisma
        npm run prisma_esbuild
        # generate prisma and seed sample data
        cp prisma/schema.prisma prisma/dist/schema.prisma
        npm run prisma_push_generate_seed
      env:
        DATABASE_PROVIDER: "postgres"
        AUTH_PROVIDER: "custom"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom"
        DATABASE_URL: "postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public&pgbouncer=true"
        DIRECT_DATABASE_URL: "postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public"
        REDIS_URL: "redis://localhost:6379"
        JWT_SECRET: "github-seats-reservation-secret-key-2026-v1.0"
        TOTAL_SEATS: 12
        SHOULD_SEED: "true"

    - name: 🎭 Install Playwright Browser Binaries
      if: success()                 # if previous step is successful
      run: |
        cd sources
        npx playwright install --with-deps

    - name: 🚀 Run End-to-End Automation Test Matrix
      if: success()                 # if previous step is successful
      run: |
        cd sources
        npx playwright test --config=postgres-playwright.config.ts
      env:
        DATABASE_PROVIDER: "postgres"
        DATABASE_URL: "postgresql://postgres:password123@localhost:5432/seat_reservation?schema=public"
        DIRECT_DATABASE_URL: "postgresql://postgres:password123@localhost:5432/seat_reservation?schema=public"
        JWT_SECRET: "github-seats-reservation-secret-key-2026-v1.0"
        TOTAL_SEATS: 12
        SHOULD_SEED: "true"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom" # custom local test

    - name: 📊 Upload Playwright HTML Test Report Artifacts
      if: always()    # always push report for debug
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
 
  # ===================================================
  # 📋 REGRESSION & AUTOMATION E2E TEST (CI) - SQLITE
  # ===================================================
  sqlite-e2e-test:
    name: 🚀 [ SQLite ] Automated Playwright E2E Verification
    runs-on: ubuntu-latest

    services:
      # redis
      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: 📥 Check out repository code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      if: success()                 # if previous step is successful
      uses: actions/setup-node@v4
      with:
        node-version: 22.14
        # cache: 'npm'

    - name: 📦 Install Package Dependencies
      if: success()                 # if previous step is successful
      # run: npm ci
      run: |
        cd sources
        npm ci
        npm install @esbuild/linux-x64 --save-optional

    - name: 🔌 Generate Prisma Client & Sync Database Schema & 🌱 Seed Sample Data
      if: success()                 # if previous step is successful
      run: |
        cd sources
        cp tsconfig.prod.json tsconfig.json
        # build prisma
        cp prisma/schema.sqlite.prisma prisma/schema.prisma
        npm run prisma_esbuild
        # generate prisma and seed sample data
        cp prisma/schema.prisma prisma/dist/schema.prisma
        npm run prisma_push_generate_seed
      env:
        DATABASE_PROVIDER: "sqlite"
        AUTH_PROVIDER: "custom"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom"
        DATABASE_URL: "file:./sqlite-test.db"
        DIRECT_DATABASE_URL: "file:./sqlite-test.db"
        REDIS_URL: "redis://localhost:6379"
        JWT_SECRET: "github-seats-reservation-secret-key-2026-v1.0"
        TOTAL_SEATS: 12
        SHOULD_SEED: "true"

    - name: 🎭 Install Playwright Browser Binaries
      if: success()                 # if previous step is successful
      run: |
        cd sources
        npx playwright install --with-deps

    - name: 🚀 Run End-to-End Automation Test Matrix
      if: success()                 # if previous step is successful
      run: |
        cd sources
        npx playwright test --config=sqlite-playwright.config.ts
      env:
        DATABASE_PROVIDER: "sqlite"
        DATABASE_URL: "file:/app/prisma/data/sqlite-test.db"
        DIRECT_DATABASE_URL: "file:/app/prisma/data/sqlite-test.db"
        JWT_SECRET: "github-seats-reservation-secret-key-2026-v1.0"
        TOTAL_SEATS: 12
        SHOULD_SEED: "true"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom" # custom local test

    - name: 📊 Upload Playwright HTML Test Report Artifacts
      if: always()    # always push report for debug
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

