# -------------------------------------------------
# GUIDELINE: Need to do before deploying to GCP
# -------------------------------------------------
# - Create GCP Provider. Ex: github-seats-reservation
#   - Issuer URL. Ex: https://githubusercontent.com
#   - Allowed audiences. Ex: 1 - https://googleapis.com; 2 - https://iam.googleapis.com (generated by GitHub CI/CD, in GitHub CI/CD console is `//iam.googleapis.com/***`)
#     + Choose `Default audience` first to get the IAM path from URL to pass into GitHub secret as ${{ GCP_WORKLOAD_PROVIDER }}
#       Ex: projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#     + After getting IAM path, choose `Allowed audiences` to input as example
#     + Suggest to choose `Default audience`:
#       Ex: https://iam.googleapis.com/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#   - Add mapping:
#     + Default mapping 1:    google.subject        - OIDC: assertion.sub
#     + Add more mapping 2:   attribute.repository  - OIDC: assertion.repository
#   - Add mapping condition for new mapping attribute 2
#     Ex: assertion.repository == "<GitHub Username>/<GitHub Repository Name>"
# - Grant access permission for IAM Service Accounts (IAM Policy) by Cloud Shell:
#   `--member` parameter pattern:
#     + principalSet://<Allowed audaudience or googleapis.com>/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/<new attribute name. Ex: attribute.repository>/<assertion.repository value. Ex: <GitHub Username>/<GitHub Repository Name>
#   Ex: gcloud iam service-accounts add-iam-policy-binding "<Service Account Email. Ex: github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com>" \
#             --project="<GCP Project Number>" \
#             --role="roles/iam.workloadIdentityUser" \
#             --member="principalSet://<Allowed audaudience or googleapis.com>/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/<new attribute name. Ex: attribute.repository>/<assertion.repository value. Ex: <GitHub Username>/<GitHub Repository Name>"
# - Info:
#   Workfload Identity Pool IAM Principal Pattern:
#     principal://iam.googleapis.com/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/subject/SUBJECT_ATTRIBUTE_VALUE
# - GitHub GCP Secret ADC (generated by GCP Service Account Token Creation):
#   + GCP_ADC_JSON (Recommended for Simple Using): {
#       "type": "service_account",
#       "project_id": <GCP Project ID/Name>,
#       "private_key_id": <GCP Service Account Private Key ID>,
#       "private_key": <GCP Service Account Private Key ID. Ex: "-----BEGIN PRIVATE KEY-----\n{...Private Key...}\n-----END PRIVATE KEY-----\n",
#       "client_email": <GCP Service Account Client Email. Ex: abc@<GCP Project ID/Name>.iam.gserviceaccount.com>,
#       "client_id": <GCP Service Account Client ID>,
#       "auth_uri": <GCP OAuth2 Auth URI. Ex: https://accounts.google.com/o/oauth2/auth>,
#       "token_uri": <GCP OAuth2 Auth Token URI. Ex: https://oauth2.googleapis.com/token>,
#       "auth_provider_x509_cert_url": <GCP OAuth2 Auth Certificate (x509) URL. Ex: https://www.googleapis.com/oauth2/v1/certs>,
#       "client_x509_cert_url": <GCP OAuth2 Client Project Certificate (x509) URL. Ex: https://www.googleapis.com/robot/v1/metadata/x509/github-seats-reservation%40gcp-seats-reservation.iam.gserviceaccount.com>,
#       "universe_domain": <GCP Universe Domain. Ex: googleapis.com>
#   }
#   + GCP_SERVICE_ACCOUNT (Required for Authentication, Pulling Image from K8s/Docker): <GCP Service Account Email. Ex: github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com>
#   + GCP_WORKLOAD_PROVIDER:
#       projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#       Ex: projects/130619617539/locations/global/workloadIdentityPools/github-seats-reservation-pool/providers/github-seats-reservation
# - For PostgreSQL: Require using Cloud Run SQL, creating it on GCP first and collection information to connect:
#       Ex: postgresql://user:password@localhost/seats_reservation?host=/cloudsql/<Cloud SQL Connection Name. Ex: project-id:region:instance-id, like this: gcp-seats-reservation:us-central1:seats-postgres-db>
# - Back to GitHub and input the secret GCP_WORKLOAD_PROVIDER value that received from previous steps
# -------------------------------------------------

name: 🌐 [ GCP Deployment ] Seats Reservation Platform CI/CD Pipeline

on:
  # auto trigger workflow
  # push:
  #   branches: [ "master" ] # active when merge code into master
  # pull_request:
  #   branches: [ "master" ]
  
  # manual trigger workflow
  workflow_dispatch:
    inputs:
      region:
        description: "🌍 GCP Region (us-central1, us-east1, us-west1)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: us-central1    # Always Free
      env_data:
        description: "🔧 Environment Variables (JSON)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: |
          [
            {
                "name":     "seats-reservation-sqlite",
                "env_vars": {
                    "DATABASE_PROVIDER":          "sqlite",
                    "AUTH_PROVIDER":              "custom",
                    "NEXT_PUBLIC_AUTH_PROVIDER":  "custom",
                    "TOTAL_SEATS":                9,
                    "SHOULD_SEED":                true
                },
                "gcp_secrets":                    "GCP_SECRET_SQLITE"
            },
            {
                "name":     "seats-reservation-postgres",
                "env_vars": {
                    "DATABASE_PROVIDER":          "postgres",
                    "AUTH_PROVIDER":              "custom",
                    "NEXT_PUBLIC_AUTH_PROVIDER":  "custom",
                    "REDIS_URL":                  "redis://redis-cache:6379",
                    "TOTAL_SEATS":                9,
                    "SHOULD_SEED":                true
                },
                "gcp_secrets":                    "GCP_SECRET_POSTGRES"
            }
          ]
  
  # allow other workflow call into (inputs same as workflow_dispatch but required)
  workflow_call:
    inputs:
      region:
        description: "🌍 GCP Region (us-central1, us-east1, us-west1)"
        required: true          # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
      env_data:
        description: "🔧 Environment Variables (JSON)"
        required: true          # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # ==============================================================================
  # 🌐 GCP DEPLOYMENT
  # ==============================================================================
  deploy-to-gcp:
    name: 🌐 Deploy to Google Cloud
    runs-on: ubuntu-latest
    # needs: build-and-push-to-docker-hub      # not require test running, due to be triggered standalone
    
    # load services configuraion
    strategy:
      fail-fast: false
      matrix:
        # run parallel threads for services
        service: ${{ fromJson(inputs.env_data) }}
    
    steps:
      # Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_GCP_DEPLOY: ${{ secrets.ALLOW_GCP_DEPLOY }}
        if: ${{ env.ALLOW_GCP_DEPLOY != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_GCP_DEPLOY is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # 1. Login to Google Cloud by Google OAuth2 ADC
      - name: 🔑 Authenticate to Google Cloud via Google OAuth2 ADC
        if: success()                 # if previous step is successful
        uses: google-github-actions/auth@v2
        with:
          # authenticate via OIDC
          # workload_identity_provider: "projects/130619617539/locations/global/workloadIdentityPools/github-seats-reservation-pool/providers/github-seats-reservation" # ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          # service_account: "github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com" # ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # authenticate via Google OAuth2 ADC JSON
          credentials_json: ${{ secrets.GCP_ADC_JSON }}
          token_format: 'access_token'        # debug token
          access_token_lifetime: '3300s'      # extend time due to be differnt timezone
          create_credentials_file: true       # export credentials for next steps
          export_environment_variables: true  # export enviroment variables for next steps
      
      # -------------------------------------------------
      # 2. Temporary Step: Meger HitHub secret and enviroment variables to deploy image up GCP:
      # - GCP_SECRET_POSTGRES: {
      #     "DATABASE_URL": <Postgres Poller/PgBounder JDBC ConnectionString>,
      #     "DIRECT_DATABASE_URL": <Postgres Directly JDBC ConnectionString>,
      #     "JWT_SECRET": <JWT Token>
      #   }
      # - GCP_SECRET_SQLITE: {
      #     "DATABASE_URL": <SQLite DB file>,
      #     "DIRECT_DATABASE_URL": <SQLite DB file>,
      #     "JWT_SECRET": <JWT Token>
      #   }
      # -------------------------------------------------
      - name: 🔐 Advanced Universal JSON Secret Provisioner and JSON Enviroment Variables for GCP
        if: success()                 # if previous step is successful
        id: gcp-deploy-env
        env:
          SERVICE_ENV_VARS: ${{ toJson(matrix.service.env_vars) }}
          GCP_SECRETS: ${{ matrix.service.gcp_secrets }}
          # Load all GitHub secret to parse
          ALL_GITHUB_SECRETS: ${{ toJSON(secrets) }}
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
        run: |
          # Use Node.js to read file JSON and find "client_email"
          GCP_SA_EMAIL=$(node -e "const data = JSON.parse(process.env.GCP_ADC_JSON); console.log(data.client_email);")
          # # debug
          # echo "- Detected Identity Email: $GCP_SA_EMAIL"
          echo "gcp_sa_email<<EOF" >> $GITHUB_OUTPUT
          echo "$GCP_SA_EMAIL" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          node -e '
            // 1. Request JSON object
            const jsonRaw = process.env.SERVICE_ENV_VARS;
            const secretKey = process.env.GCP_SECRETS;
            let envObj = jsonRaw ? JSON.parse(jsonRaw) : {};
            if (secretKey && process.env.ALL_GITHUB_SECRETS) {
              const githubSecrets = JSON.parse(process.env.ALL_GITHUB_SECRETS);
              const secretRaw = githubSecrets[secretKey];
              if (secretRaw) {
                const secretObject = typeof secretRaw === "object" ? secretRaw : JSON.parse(secretRaw);
                envObj = { ...envObj, ...secretObject };
              }
            }
            
            // 2. convert to array key=value
            const kvArray = Object.entries(envObj).map(([key, value]) => `${key}=${value}`);
            
            // 3. combine array by comma
            const resultString = kvArray.join(",");
            
            // 4. output to GitHub Actions
            const fs = require("fs");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `env_vars=${resultString}\n`);
          '
      
      # 3. Deploy to Google Cloud Run by pulling image from Docker Hub
      - name: 🚀 Deploy to GCP Cloud Run
        if: success()                 # if previous step is successful
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ matrix.service.name }}
          region: ${{ inputs.region }}
          cleanup_credentials: false      # prevent clean up to do manually
          # Point to Public Docker Hub, no need to use Google Artifact Registry API due to be charged
          image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service.name }}:latest
          
          # ⚠️ Parameter to force system running in Free Tier Forever
          # `set-env-vars` apply enviroment variables for docker image
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=1
            --memory=512Mi
            --cpu=1
            --service-account="${{ steps['gcp-deploy-env'].outputs.gcp_sa_email }}"
            --set-env-vars="${{ steps['gcp-deploy-env'].outputs.env_vars }}"
      
      # 4. Check deployment status
      - name: 🔍 Check GCP Service Status (Health Check)
        if: success()                 # if previous step is successful
        id: gcp_cloud_run_deployment_check
        env:
          GCP_SERVICE: ${{ matrix.service.name }}
          GCP_SERVICE_REGION: ${{ inputs.region }}
        run: |
          # wait 5 seconds for Cloud Run start
          sleep 5
          
          # Send request to deployed URL (URL from previous gcloud deploy step)
          echo "- Service: $GCP_SERVICE | Region: $GCP_SERVICE_REGION"
          URL=$(gcloud run services describe $GCP_SERVICE --platform managed --region $GCP_SERVICE_REGION --format 'value(status.url)')
          
          echo "Verify GCP cloud run URL: $URL"
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" $URL)
          
          if [ $STATUS -eq 200 ]; then
            echo "✅ Service worked successful! Status: $STATUS"
            echo "- 🚀 Public URL: $URL"
            echo "gcp_cloud_run_url=$URL" >> $GITHUB_OUTPUT
          else
            echo "❌ Service Error on GCP! Status: $STATUS"
            exit 1
          fi
      
      # 5. Save service published information to an temporary artifact for next step
      - name: 💾 Save Service URL to Temp File
        if: success()                 # if previous step is successful
        run: |
          # create a JSON file to keep the published information
          echo '{"name": "gcp-${{ matrix.service.name }}", "published_url": "${{ steps.gcp_cloud_run_deployment_check.outputs.gcp_cloud_run_url }}"}' > "gcp-${{ matrix.service.name }}.json"
      
      # 5.1. Upload published service JSON to an temporary artifact
      - name: 📦 Upload Published Service Information Artifact
        if: success()                 # if previous step is successful
        uses: actions/upload-artifact@v4
        with:
          # Unique artifact name by service to avoid conflicted/overwritten
          name: gcp-url-${{ matrix.service.name }}
          path: "gcp-${{ matrix.service.name }}.json"
      
      # Optional: Post the URL as a comment on your Pull Request (great for debugging)
      - name: Comment PR with URL
        if: always() && github.event_name == 'pull_request'    # if previous step is successful
        uses: thollander/actions-comment-pull-request@v2
        with:
          message: |
            🚀 Deployment successful!
            🔍 GCP Cloud Run Public URL: ${{ steps.gcp_cloud_run_deployment_check.outputs.gcp_cloud_run_url }}
  
  # ==============================================================================
  # 🛠️ COMBINE PUBLISHED URL(s) BY SERVICE
  # ==============================================================================
  combine-published-urls-by-service:
    name: 🌐 Combine Published URL(s) to update README.md
    runs-on: ubuntu-latest
    needs: [ deploy-to-gcp ]                        # wait for deployment
    
    # output for next job
    outputs:
      published-services: ${{ steps.build_published_services.outputs.published-services }}
    
    steps:
      # 1. Download Published Service Information Artifact from previous job to combine
      - name: 📥 Download All Service Artifacts
        uses: actions/download-artifact@v4
        with:
          # Use pattern (*) to download all artifacts with prefix `gcp-url-` to same folder
          pattern: gcp-url-*
          path: temp-gcp-urls
          merge-multiple: true # Merge all files `.json` to `temp-gcp-urls` folder
      
      # 2. Read artifact folder to combine published information
      - name: 🛠️ Combine Published URL(s) to Enviroment JSON Variables
        id: build_published_services
        run: |
          echo "1. Artifact JSON files:"
          ls -la temp-gcp-urls/
          
          echo "----------------------------------------"
          echo "2. Combine all JSON files..."
          # Check if not found any json file
          if [ ! -d "temp-gcp-urls" ] || [ -z "$(ls -A temp-gcp-urls/gcp-*.json 2>/dev/null)" ]; then
            echo "❌ Not found any published information `.json` file."
            exit 1
          fi
          
          # Use `jq` to read all `.json` file and collect to JSON array
          PUBLISHED_SERVICES=$(jq -s -c '.' temp-gcp-urls/gcp-*.json)
          echo "🏃 Published Services:"
          echo "$PUBLISHED_SERVICES"
          echo "published-services=$PUBLISHED_SERVICES" >> $GITHUB_OUTPUT
  
  # ==============================================================================
  # ⚡ PUBLISH URL TO README
  # ==============================================================================
  publish-url-to-readme:
    name: ⚡ Generate and Export GCP/GKE Links to README
    needs: [ deploy-to-gcp, combine-published-urls-by-service ]           # wait for deployment, combine enviroment
    secrets: inherit # bypass secrets to child workflow
    uses: ./.github/workflows/ci-cd-publish-url.yml
    with:
      env_data: ${{ needs.combine-published-urls-by-service.outputs.published-services }}
  
  # ==============================================================================
  # ⚙️ CLEAN UP
  # ==============================================================================
  clean-up:
    name: ⚙️ Force Kill Orphan Processes
    runs-on: ubuntu-latest
    needs: [ deploy-to-gcp, publish-url-to-readme ]           # wait for deployment, combine enviroment
    # always run although other jobs are success or failure
    if: ${{ !cancelled() }}
    
    steps:
      # Clean up temporary artifact
      - name: 🧹 Clean up Temp Artifacts from GitHub Storage
        if: always()    # Always run to clean up
        uses: geekyeggo/delete-artifact@v5
        with:
          # Use pattern (*) to delete all artifacts with prefix `gcp-url-`
          name: gcp-url-*
      
      # Clean up
      - name: ⚙️ Force Kill Orphan Processes
        if: always()    # Always run to clean up
        run: |
          # Kill background node process
          echo "--- 1. Cleaning background host processes ---"
          pkill -f node || true
          
          # Clean all container sidecar (Postgres, Redis) and Volume to avoid cache port
          echo "--- 2. Flushing dynamic docker infrastructure ---"
          docker ps -aq | xargs -r docker rm -f || true
          docker volume prune -f || true
          
          # !!!IMPORTANT!!!
          # Use Prisma CLI to clean all data in Database Neon/Postgres Production
          # Help next build to have clean database, not conflicting data
          # Only running if database local (virtual local test).
          # If DATABASE_URL is PRODUCTION (Neon / GCP Cloud SQL), skip to protect Production
          if [[ "$DATABASE_URL" == *"localhost"* || "$DATABASE_URL" == *"127.0.0.1"* ]]; then
            echo "⚠️ - Detected local test database. Running safe purge..."
            npx prisma db purge --force || npx prisma migrate reset --force || true
          else
            echo "🔒 - !!!ATTENTION!!! Detected PRODUCTION Database. Skipping purge to protect live data!"
          fi
          
          # Clean context of K8s and Token GCP on Virtual Runner Machine for security and cache conflicting next build time
          echo "--- 4. Clearing localized Kubernetes context ---"
          rm -rf ~/.kube ~/.config/gcloud || true

