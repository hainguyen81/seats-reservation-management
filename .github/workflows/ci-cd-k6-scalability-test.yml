name: 📈 [ TEST ] Scalability k6 Stress Testing (Pure k6 Load Injector)

on:
  # Allows manual triggering of this workflow directly from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      k6_test_file:
        description: "👷 Concurrency k6 Stress Testing File Path (Ex: ./sources/tests/scalability-test.js)"
        required: false
        type: string
        default: "./sources/tests/scalability-health-check-test.js"
      target_url:
        description: "🌐 Target Environment URL for Scalability Load Testing (LoadBalancer IP or Domain)"
        required: false
        type: string
        default: "http://localhost:3000"
      concurrent_users:
        description: "👷 Maximum virtual users (VUs) to simulate simultaneously"
        required: false
        type: number
        default: 50
      test_duration:
        description: "✨ Execution boundary for the high stress testing injection loop (in seconds)"
        required: false
        type: number
        default: 30
      k6_test_report:
        description: "📋 Report Type"
        required: false
        type: choice
        default: "🌿 GitHub CI/CD Console"
        options:
          - 🌿 GitHub CI/CD Console
          - 🔣 JSON
          - 🔢 CSV
          - 🕸️ Web Dashboard [ Port 5665 ]
          - 🔥 Prometheus
          - 📊 OTLP
          - 👣 Experimental OTLP
          - 🔭 Time-Series Database InfluxDB [ Port 8086 ]
          - 📝 StatsD, Datadog Agent, or New Relic
  
  # allow other workflow call into (inputs same as workflow_dispatch but required)
  workflow_call:
    inputs:
      k6_test_file:
        description: "👷 Concurrency k6 Stress Testing File Path (Ex: ./sources/tests/scalability-test.js)"
        required: false
        type: string
        default: "./sources/tests/scalability-health-check-test.js"
      target_url:
        description: "🌐 Target Environment URL for Scalability Load Testing (LoadBalancer IP or Domain)"
        required: true
        type: string
      concurrent_users:
        description: "👷 Maximum virtual users (VUs) to simulate simultaneously"
        required: false
        type: number
        default: 50
      test_duration:
        description: "✨ Execution boundary for the high stress testing injection loop (in seconds)"
        required: false
        type: number
        default: 30
      k6_test_report:
        description: "📋 Report Type"
        required: true
        type: choice
        default: "🌿 GitHub CI/CD Console"
        options:
          - 🌿 GitHub CI/CD Console
          - 🔣 JSON
          - 🔢 CSV
          - 🕸️ Web Dashboard [ Port 5665 ]
          - 🔥 Prometheus: Metrics Collecting
          - 📊 OTLP
          - 👣 Experimental OTLP
          - 🔭 Time-Series Database InfluxDB [ Port 8086 ]
          - 📝 StatsD, Datadog Agent, or New Relic

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: read
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # Run High-Concurrency k6 Injection
  k6-injection:
    name: 🔥 Dispatch High-Concurrency k6 Load Injection Matrix
    runs-on: ubuntu-latest
    steps:
      # 1. Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_GKE_SCABILITY_TEST: ${{ secrets.ALLOW_GKE_SCABILITY_TEST }}
        if: ${{ env.ALLOW_GKE_SCABILITY_TEST != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_GKE_SCABILITY_TEST is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # 2. Check out sources to run k6 test file
      - name: 📁 Checkout Benchmark Engineering Repositories
        if: success()                 # if previous step is successful
        uses: actions/checkout@v4
      
      # 3. Set-up native k6 engine to test
      - name: ⚙️ Setup Native k6 Binary Engine on Runner Node
        if: success()                 # if previous step is successful
        uses: grafana/setup-k6-action@v1
      
      # 4. Execute k6 test
      - name: 🏹 Launch Synchronized Concurrency Attack Loop
        if: success()                 # if previous step is successful
        env:
          TARGET_URL: ${{ inputs.target_url }}
          CONCURRENT_USERS: ${{ inputs.concurrent_users }}
          TEST_DURATION: ${{ inputs.test_duration }}
          K6_TEST_FILE: ${{ inputs.k6_test_file }}
          K6_RPT_TYPE: ${{ inputs.k6_test_report }}
          # 🎯 Use correct prefix `K6_OTLP_` to allow k6 engine attach them when sending metrics
          K6_OTLP_HTTP_ENDPOINT: ${{ secrets.GRAFANA_PROMETHEUS_URL }}
          # OTLP Authentication requires Basic Auth under format "Username:Token"
          K6_OTLP_HTTP_HEADERS: "Authorization=Basic ${{ b64encode(format('{0}:{1}', secrets.GRAFANA_USER_ID, secrets.GRAFANA_API_TOKEN)) }}"
        run: |
          echo "========================================================================="
          echo "🎯 TARGET URL DEPLOYED OUTSIDE: $TARGET_URL"
          echo "👥 SIMULATING MAXIMUM ATTACK VUs: $CONCURRENT_USERS"
          echo "⏳ SUSTAINED INJECTION HOLD WINDOW: $TEST_DURATION"
          echo "========================================================================="
          
          # ⚙️ Calculate and encode AUTHORIZATION HEADER by BASIC AUTH STANDARDS
          RAW_AUTH="${{ secrets.GRAFANA_USER_ID }}:${{ secrets.GRAFANA_API_TOKEN }}"
          ENCODED_AUTH=$(echo -n "$RAW_AUTH" | base64)
          
          # Force enviroments to pipeline for k6 using
          export K6_OTLP_HTTP_ENDPOINT="${{ secrets.GRAFANA_PROMETHEUS_URL }}"
          export K6_OTLP_HTTP_HEADERS="Authorization=Basic $ENCODED_AUTH"
          
          # execute k6 test
          # k6 run $K6_TEST_FILE
          # available output types: cloud (maybe charged fee), csv, experimental-opentelemetry, experimental-prometheus-rw, influxdb, json, opentelemetry, statsd, web-dashboard
          if [ "$K6_RPT_TYPE" == "🌿 GitHub CI/CD Console" ]; then
            k6 run $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "🔥 Prometheus" ]; then
            k6 run \
              --out experimental-prometheus-rw \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "📊 OTLP" ]; then
            k6 run \
              --out opentelemetry \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "👣 Experimental OTLP" ]; then
            k6 run \
              --out experimental-opentelemetry \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "🔭 Time-Series Database InfluxDB [ Port 8086 ]" ]; then
            k6 run \
              --out influxdb \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "📝 StatsD, Datadog Agent, or New Relic" ]; then
            k6 run \
              --out statsd \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "🔣 JSON" ]; then
            echo "$K6_RPT_TYPE: Report JSON file 'k6-test-report.json' will be exported after testing finished"
            k6 run \
              --out json=k6-test-report.json \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "🔢 CSV" ]; then
            echo "$K6_RPT_TYPE: Report JSON file 'k6-test-report.csv' will be exported after testing finished"
            k6 run \
              --out csv=k6-test-report.csv \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "🕸️ Web Dashboard [ Port 5665 ]" ]; then
            k6 run \
              --out web-dashboard \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          else
            echo "❌ $K6_RPT_TYPE is an UNSUPPORTED report type."
            exit 1
          fi
      
      # 5. Upload report files to artifact for downloading
      - name: 📦 Archive Performance Telemetry Artifacts for Download
        if: success() && (inputs.k6_test_report == '🔣 JSON' || inputs.k6_test_report == '🔢 CSV')
        uses: actions/upload-artifact@v4
        with:
          name: k6-test-reports     # report file ZIP name
          path: k6-test-report.*
          retention-days: 3         # auto delete file on GitHub after 3 days to save resources
      
      # 6. Report summary
      - name: 📊 Compile Aggregated Telemetry Report to GitHub Summary
        env:
          K6_RPT_TYPE: ${{ inputs.k6_test_report }}
        if: always()
        run: |
          echo "### 📊 Concurrency k6 Benchmarking Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Public Injection Link Endpoint:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Peak Virtual Users Mobilized:** \`${{ inputs.concurrent_users }}\` VUs" >> $GITHUB_STEP_SUMMARY
          echo "* **Sustained Load Blast Window:** \`${{ inputs.test_duration }}\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Execution metrics maps registered. Check the step logs above to review raw telemetry latency data table!" >> $GITHUB_STEP_SUMMARY
          echo "✅ Real-time metrics streaming process executed flawlessly. Grafana dashboard telemetry stack ready for export." >> $GITHUB_STEP_SUMMARY
          if [ "$K6_RPT_TYPE" = "🔣 JSON" -o "$K6_RPT_TYPE" = "🔢 CSV" ]; then
            echo "✅ Raw test data successfully captured. Navigate to the top of this Workflow run summary page to download **k6-test-reports.zip**!" >> $GITHUB_STEP_SUMMARY
          fi
      
      # Clean up
      - name: ⚙️ Force Kill Orphan Processes
        if: always()    # Always run to clean up
        run: |
          # Kill background node process
          echo "--- 1. Cleaning background host processes ---"
          pkill -f node || true
