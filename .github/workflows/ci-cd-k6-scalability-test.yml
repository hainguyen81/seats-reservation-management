name: 📈 [ TEST ] Concurrency Stress Testing Loop (Pure k6 Load Injector)

on:
  # Allows manual triggering of this workflow directly from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      k6_test_file:
        description: "👷 Concurrency k6 Stress Testing File Path (Ex: ./sources/tests/scalability-test.js)"
        required: false
        default: "./sources/tests/scalability-test.js"
        type: string
      target_url:
        description: "🌐 Target Environment URL for Scalability Load Testing (LoadBalancer IP or Domain)"
        required: true
        type: string
        default: "http://localhost:3000"
      concurrent_users:
        description: "👷 Maximum virtual users (VUs) to simulate simultaneously"
        required: false
        default: 50
        type: number
      test_duration:
        description: "✨ Execution boundary for the high stress testing injection loop (in seconds)"
        required: false
        default: 30
        type: number

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: read
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # Run High-Concurrency k6 Injection
  k6-injection:
    name: 🔥 Dispatch High-Concurrency k6 Load Injection Matrix
    runs-on: ubuntu-latest
    steps:
      # 1. Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_GKE_SCABILITY_TEST: ${{ secrets.ALLOW_GKE_SCABILITY_TEST }}
        if: ${{ env.ALLOW_GKE_SCABILITY_TEST != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_GKE_SCABILITY_TEST is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # 2. Check out sources to run k6 test file
      - name: 📁 Checkout Benchmark Engineering Repositories
        if: success()                 # if previous step is successful
        uses: actions/checkout@v4
      
      # 3. Set-up native k6 engine to test
      - name: ⚙️ Setup Native k6 Binary Engine on Runner Node
        if: success()                 # if previous step is successful
        uses: grafana/setup-k6-action@v1
      
      # 4. Execute k6 test
      - name: 🏹 Launch Synchronized Concurrency Attack Loop
        if: success()                 # if previous step is successful
        env:
          TARGET_URL: ${{ inputs.target_url }}
          CONCURRENT_USERS: ${{ inputs.concurrent_users }}
          TEST_DURATION: ${{ inputs.test_duration }}
          K6_TEST_FILE: ${{ inputs.k6_test_file }}
        run: |
          echo "========================================================================="
          echo "🎯 TARGET URL DEPLOYED OUTSIDE: $TARGET_URL"
          echo "👥 SIMULATING MAXIMUM ATTACK VUs: $CONCURRENT_USERS"
          echo "⏳ SUSTAINED INJECTION HOLD WINDOW: $TEST_DURATION"
          echo "========================================================================="
          
          # execute k6 test
          k6 run $K6_TEST_FILE
      
      # 5. Report summary
      - name: 📊 Compile Aggregated Telemetry Report to GitHub Summary
        if: always()
        run: |
          echo "### 📊 Concurrency k6 Benchmarking Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Public Injection Link Endpoint:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Peak Virtual Users Mobilized:** \`${{ inputs.concurrent_users }}\` VUs" >> $GITHUB_STEP_SUMMARY
          echo "* **Sustained Load Blast Window:** \`${{ inputs.test_duration }}\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Execution metric maps registered. Check the step logs above to review raw telemetry latency data table!" >> $GITHUB_STEP_SUMMARY
      
      # Clean up
      - name: ⚙️ Force Kill Orphan Processes
        if: always()    # Always run to clean up
        run: |
          # Kill background node process
          echo "--- 1. Cleaning background host processes ---"
          pkill -f node || true
