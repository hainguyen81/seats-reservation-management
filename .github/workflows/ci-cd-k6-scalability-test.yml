name: 📈 [ TEST ] Scalability k6 Stress Testing (Pure k6 Load Injector)

on:
  # Allows manual triggering of this workflow directly from the GitHub Actions UI
  workflow_dispatch:
    inputs:
      k6_test_file:
        description: "👷 Concurrency k6 Stress Testing File Path (Ex: ./sources/tests/scalability-test.js)"
        required: false
        type: string
        default: "./sources/tests/scalability-health-check-test.js"
      target_url:
        description: "🌐 Target Environment URL for Scalability Load Testing (LoadBalancer IP or Domain)"
        required: false
        type: string
        default: "http://localhost:3000"
      concurrent_users:
        description: "👷 Maximum virtual users (VUs) to simulate simultaneously"
        required: false
        type: number
        default: 50
      test_duration:
        description: "✨ Execution boundary for the high stress testing injection loop (in seconds)"
        required: false
        type: number
        default: 30
      k6_test_report:
        description: "📋 Report Type"
        required: false
        type: choice
        default: "🌿 GitHub CI/CD Console"
        options:
          - "🌿 GitHub CI/CD Console"
          - "🔣 JSON"
          - "🔢 CSV"
          - "🕸️ Web Dashboard"
          - "🔥 Prometheus"
          - "📊 OTLP"
          - "👣 Experimental OTLP"
          - "🔭 Time-Series Database InfluxDB"
          - "📝 Datadog Agent"
  
  # allow other workflow call into (inputs same as workflow_dispatch but required)
  workflow_call:
    inputs:
      k6_test_file:
        description: "👷 Concurrency k6 Stress Testing File Path (Ex: ./sources/tests/scalability-test.js)"
        required: false
        type: string
        default: "./sources/tests/scalability-health-check-test.js"
      target_url:
        description: "🌐 Target Environment URL for Scalability Load Testing (LoadBalancer IP or Domain)"
        required: true
        type: string
      concurrent_users:
        description: "👷 Maximum virtual users (VUs) to simulate simultaneously"
        required: false
        type: number
        default: 50
      test_duration:
        description: "✨ Execution boundary for the high stress testing injection loop (in seconds)"
        required: false
        type: number
        default: 30
      # due to GitHub not support type `choice` in `workflow_call`,
      # so need to validate and map between `workflow_call` and `workflow_dispatch`
      # supported available types: `console`, `json`, `csv`, `web-dashboard`, `prometheus`, `otlp`, `experimental-otlp`, `influxdb`, `datadog`
      k6_test_report:
        description: "📋 Report Type"
        required: false
        type: string
        default: "console"

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: read
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'
  
  SUPPORTED_REPORT_TYPES: >
    {
      "console":              "🌿 GitHub CI/CD Console",
      "json":                 "🔣 JSON",
      "csv":                  "🔢 CSV",
      "web-dashboard":        "🕸️ Web Dashboard",
      "prometheus":           "🔥 Prometheus",
      "otlp":                 "📊 OTLP",
      "experimental-otlp":    "👣 Experimental OTLP",
      "influxdb":             "🔭 Time-Series Database InfluxDB",
      "datadog":              "📝 Datadog Agent"
    }

jobs:
  # Run High-Concurrency k6 Injection
  k6-injection:
    name: 🔥 Dispatch High-Concurrency k6 Load Injection Matrix
    runs-on: ubuntu-latest
    steps:
      # 1. Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_GKE_SCABILITY_TEST: ${{ secrets.ALLOW_GKE_SCABILITY_TEST }}
        if: ${{ env.ALLOW_GKE_SCABILITY_TEST != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_GKE_SCABILITY_TEST is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # 2. Check to convert the `workflow_call.k6_test_report` to same value as `workflow_dispatch.k6_test_report`
      - name: 🎛️ Validate and Map Performance Report Enums
        id: k6-rpt-gateway
        env:
          INPUTS_K6_RPT_TYPE: ${{ inputs.k6_test_report }}
        run: |
          node -e '
            // 🎯 check the inputted report type
            const rawInputRptType = process.env.INPUTS_K6_RPT_TYPE ? process.env.INPUTS_K6_RPT_TYPE.trim().toLowerCase() : "console";
            
            // 1. define value map between `workflow_call` and `workflow_dispatch`
            const FULL_RPT_TYPES = JSON.parse(process.env.SUPPORTED_REPORT_TYPES);
            const SHORT_RPT_TYPES = Object.keys(FULL_MAP);
            const LONG_RPT_TYPES = Object.values(FULL_MAP);
            
            let rptTypeFullValue = "";
            let rptTypeShortValue = "";
            
            // 2. check short value
            if (SHORT_RPT_TYPES.includes(rawInputRptType)) {
              // Use short value as calling from `workflow_call`
              rptTypeFullValue = FULL_RPT_TYPES[rawInputRptType];
              rptTypeShortValue = rawInputRptType;
              console.log(`✅ [ 'workflow_call' detected ] Successfully mapped Short Value [ ${rawInputRptType} ] to Full Profile: [ ${rptTypeFullValue} ]`);
            
            } else {
              // Use Full Profile as calling from `workflow_dispatch`.
              const rptShortValueKey = Object.keys(FULL_RPT_TYPES).find(key => FULL_RPT_TYPES[key].toLowerCase() === rawInputRptType || key.toLowerCase() === rawInputRptType);
              
              if (rptShortValueKey) {
                rptTypeFullValue = FULL_RPT_TYPES[rptShortValueKey];
                rptTypeShortValue = rptShortValueKey;
                console.log(`✅ [ 'workflow_dispatch' detected] Input matched Profile / Key. Preserving standard layout: [ ${rptTypeFullValue} ]`);
              
              } else {
                console.error(`🚨 [ Invalid k6 Report Type ] The provided k6 report type [ ${rawInputRptType} ] is completely INVALID / NOT SUPPORTED!`);
                console.error(`👉 Allowed values (case-insensitive) are: [ ${SHORT_RPT_TYPES.join(" | ")} ] or [ ${LONG_RPT_TYPES.join(" | "} ]`);
                process.exit(1);
              }
            }
            
            // 3. export k6 report type for next steps
            const fs = require("fs");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `rptTypeFullValue=${rptTypeFullValue}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `rptTypeShortValue=${rptTypeShortValue}\n`);
          '
      
      # 2. Check out sources to run k6 test file
      - name: 📁 Checkout Benchmark Engineering Repositories
        if: success()                 # if previous step is successful
        uses: actions/checkout@v4
      
      # 2.1 Optional: for InfluxDB metrics report
      - name: 🐋 Spin Up Isolated Docker InfluxDB Substrate Server
        if: success() && (steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'influxdb')
        run: |
          echo "Bootstrapping containerized InfluxDB storage node..."
          # Use InfluxDB 1.8 port 8086
          docker run -d \
            -p 8086:8086 \
            --name local-influxdb-agent \
            influxdb:1.8
          
          # wait 5 seconds for container starting in RAM
          sleep 5
          
          # create a internal db to save metrics report - k6-test-report
          docker exec local-influxdb-agent influx -execute "CREATE DATABASE k6-test-report"
          echo "✅ InfluxDB Docker infrastructure established successfully at port 8086."
      
      # 2.2 Optional: for Datadog Agent
      - name: 🐋 Spin Up Local Vector Agent Node (Absolute Offline)
        if: success() && (steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'datadog')
        run: |
          echo "Bootstrapping containerized Vector Agent logging substrate..."
          
          # create light datadog config file in RAM to control datadog vector:
          # "open port 8125 to receive k6, after that export to file /tmp/vector-output.json"
          mkdir -p ./vector-config
          cat << 'EOF' > ./vector-config/vector.yaml
          sources:
            k6_statsd:
              type: "statsd"
              address: "0.0.0.0:8125"
              mode: "udp"
          
          sinks:
            physical_file_export:
              type: "file"
              inputs: ["k6_statsd"]
              path: "/tmp/vector-output.json"
              encoding:
                codec: "json"
          EOF
          
          # run Container Vector Local Docker, mount folder config and ouput folder
          docker run -d \
            -p 8125:8125/udp \
            --name vector-local-agent \
            -v $(pwd)/vector-config:/etc/vector:ro \
            -v $(pwd)/perf-reports:/tmp \
            timberio/vector:0.30.X-debian
          
          # wait 3 seconds for container starting in RAM
          sleep 3
          echo "✅ Local Vector Agent established successfully. DogStatsD pipeline listening at UDP port 8125."
      
      # 3. Set-up native k6 engine to test
      - name: ⚙️ Setup Native k6 Binary Engine on Runner Node
        if: success()                 # if previous step is successful
        uses: grafana/setup-k6-action@v1
      
      # 4. Execute k6 test
      - name: 🏹 Launch Synchronized Concurrency Attack Loop
        if: success()                 # if previous step is successful
        env:
          TARGET_URL: ${{ inputs.target_url }}
          CONCURRENT_USERS: ${{ inputs.concurrent_users }}
          TEST_DURATION: ${{ inputs.test_duration }}
          K6_TEST_FILE: ${{ inputs.k6_test_file }}
          K6_RPT_TYPE: ${{ steps.k6-rpt-gateway.outputs.rptTypeShortValue }}
          K6_RPT_TYPE_NAME: ${{ steps.k6-rpt-gateway.outputs.rptTypeFullValue }}
        run: |
          echo "========================================================================="
          echo "🎯 TARGET URL DEPLOYED OUTSIDE: $TARGET_URL"
          echo "👥 SIMULATING MAXIMUM ATTACK VUs: $CONCURRENT_USERS"
          echo "⏳ SUSTAINED INJECTION HOLD WINDOW: $TEST_DURATION"
          echo "⏳ K6 REPORT TYPE: $K6_RPT_TYPE | $K6_RPT_TYPE_NAME"
          echo "========================================================================="
          
          # execute k6 test
          # k6 run $K6_TEST_FILE
          # available output types: cloud (maybe charged fee), csv, experimental-opentelemetry, experimental-prometheus-rw, influxdb, json, opentelemetry, statsd, web-dashboard
          if [ "$K6_RPT_TYPE" == "console" -o "$K6_RPT_TYPE_NAME" == "🌿 GitHub CI/CD Console" ]; then
            k6 run $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "prometheus" -o "$K6_RPT_TYPE_NAME" == "🔥 Prometheus" ]; then
            # ⚙️ Calculate and encode AUTHORIZATION HEADER by BASIC AUTH STANDARDS
            RAW_AUTH="${{ secrets.GRAFANA_USER_ID }}:${{ secrets.GRAFANA_API_TOKEN }}"
            ENCODED_AUTH=$(echo -n "$RAW_AUTH" | base64)
            
            # Force enviroments to pipeline for k6 using
            export K6_OTLP_HTTP_ENDPOINT="${{ secrets.GRAFANA_PROMETHEUS_URL }}"
            export K6_OTLP_HTTP_HEADERS="Authorization=Basic $ENCODED_AUTH"
            
            k6 run \
              --out experimental-prometheus-rw \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "otlp" -o "$K6_RPT_TYPE_NAME" == "📊 OTLP" ]; then
            k6 run \
              --out opentelemetry \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "experimental-otlp" -o "$K6_RPT_TYPE_NAME" == "👣 Experimental OTLP" ]; then
            k6 run \
              --out experimental-opentelemetry \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "influxdb" -o "$K6_RPT_TYPE_NAME" == "🔭 Time-Series Database InfluxDB" ]; then
            k6 run \
              --out influxdb=http://localhost:8086/k6-test-report \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "datadog" -o "$K6_RPT_TYPE_NAME" == "📝 Datadog Agent" ]; then
            k6 run \
              --out statsd \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "json" -o "$K6_RPT_TYPE_NAME" == "🔣 JSON" ]; then
            k6 run \
              --out json=k6-test-report.json \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "csv" -o "$K6_RPT_TYPE_NAME" == "🔢 CSV" ]; then
            k6 run \
              --out csv=k6-test-report.csv \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          elif [ "$K6_RPT_TYPE" == "web-dashboard" -o "$K6_RPT_TYPE_NAME" == "🕸️ Web Dashboard" ]; then
            k6 run \
              --out web-dashboard=report=k6-test-report.html \
              --tag test_env=seats-reservation-k6-test \
              $K6_TEST_FILE
          
          else
            echo "❌ [ $K6_RPT_TYPE | $K6_RPT_TYPE_NAME ] is an UNSUPPORTED report type."
            exit 1
          fi
      
      # 4.1 Optional: for InfluxDB metrics report
      - name: 🗜️ Execute InfluxDB Telemetry Data Export Protocol
        if: success() && (steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'influxdb')
        run: |
          echo "Extracting raw time-series data chunks from docker container ecosystem..."
          
          # use influxd backup tool in container to compress db output to temporary folder
          docker exec local-influxdb-agent influxd backup -database k6-test-report /tmp/k6-test-report
          
          # copy file backup from Container Docker to Runner VM
          docker cp local-influxdb-agent:/tmp/k6-test-report ./k6-influxdb-exported-data
          
          # compress exported folder backup to file .tar.gz for downloading
          tar -czvf k6-test-report.tar.gz ./k6-influxdb-exported-data
          echo "✅ Telemetry data exported and compressed successfully into k6-test-report.tar.gz"
      
      # 4.2 Optional: for Datadog Agent
      - name: 🗜️ Process and Compact Vector Exported Telemetry File
        if: success() && (steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'datadog')
        run: |
          echo "Validating offline telemetry logs captured on local storage substrate..."
          
          # validate file json by Vector already existed
          if [ -f "./perf-reports/vector-output.json" ]; then
            echo "✅ Telemetry file captured successfully!"
            # compress to file .tar.gz for downloading
            tar -czvf k6-test-report.tar.gz -C ./perf-reports vector-output.json
          else
            echo "🚨 [Critical Error]: Vector Agent failed to write telemetry logs on disk."
            exit 1
          fi
      
      # 5. Upload report files to artifact for downloading
      - name: 📦 Archive Performance Telemetry Artifacts for Download
        if: >-
          success()
          && (steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'json'
            || steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'csv'
            || steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'web-dashboard'
            || steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'influxdb'
            || steps.k6-rpt-gateway.outputs.rptTypeShortValue == 'datadog'
          )
        uses: actions/upload-artifact@v4
        with:
          name: k6-test-reports     # report file ZIP name
          path: k6-test-report.*
          retention-days: 3         # auto delete file on GitHub after 3 days to save resources
      
      # 6. Report summary
      - name: 📊 Compile Aggregated Telemetry Report to GitHub Summary
        env:
          K6_RPT_TYPE: ${{ steps.k6-rpt-gateway.outputs.rptTypeShortValue }}
          K6_RPT_TYPE_NAME: ${{ steps.k6-rpt-gateway.outputs.rptTypeFullValue }}
        if: always()
        run: |
          echo "### 📊 Concurrency k6 Benchmarking Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "* **Target Public Injection Link Endpoint:** ${{ inputs.target_url }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Peak Virtual Users Mobilized:** \`${{ inputs.concurrent_users }}\` VUs" >> $GITHUB_STEP_SUMMARY
          echo "* **Sustained Load Blast Window:** \`${{ inputs.test_duration }}\`" >> $GITHUB_STEP_SUMMARY
          echo "✅ Execution metrics maps registered. Check the step logs above to review raw telemetry latency data table!" >> $GITHUB_STEP_SUMMARY
          echo "✅ Real-time metrics streaming process executed flawlessly. Grafana dashboard telemetry stack ready for export." >> $GITHUB_STEP_SUMMARY
          if [ "$K6_RPT_TYPE" = "json" ] \
            -o [ "$K6_RPT_TYPE" = "csv" ] \
            -o [ "$K6_RPT_TYPE" = "web-dashboard" ] \
            -o [ "$K6_RPT_TYPE" = "influxdb" ] \
            -o [ "$K6_RPT_TYPE" = "datadog" ]; then
            echo "✅ [ $K6_RPT_TYPE | $K6_RPT_TYPE_NAME ] Raw test data successfully captured. Navigate to the top of this Workflow run summary page to download **k6-test-reports.zip**!" >> $GITHUB_STEP_SUMMARY
          fi
      
      # Clean up
      - name: ⚙️ Force Kill Orphan Processes
        if: always()    # Always run to clean up
        run: |
          # Kill background node process
          echo "--- 1. Cleaning background host processes ---"
          pkill -f node || true
