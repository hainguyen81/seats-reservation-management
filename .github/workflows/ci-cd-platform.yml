name: 🚀 Seats Reservation Platform CI/CD Pipeline

on:
  push:
    branches: [ "master" ] # active when merge code into master
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: read
  packages: write

# enviroment
env:
  GCP_REGION: us-central1   # Always Free
  REDIS_URL: redis://redis-cache:6379
  JWT_SECRET: seats-reservation-management-secret-key-2026
  TOTAL_SEATS: 9
  SHOULD_SEED: true

jobs:
  # ===================================================
  # 📋 REGRESSION & AUTOMATION E2E TEST (CI) - POSTGRES
  # ===================================================
  postgres-e2e-test:
    name: 🚀 [ PostgreSQL ] Automated Playwright E2E Verification
    runs-on: ubuntu-latest

    services:
      # redis
      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379

      # postgres
      postgres-db:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_secret_pass
          POSTGRES_DB: seats_reservation
        ports:
          - 5432:5432
        # health check
        options: >-
          --health-cmd "pg_isready -U postgres -d seat_reservation"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: 📥 Check out repository code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22.14
        # cache: 'npm'

    - name: 📦 Install Package Dependencies
      # run: npm ci
      run: |
        cd sources
        npm install
        npm ci

    # ==============================================================================
    # !!!IMPORTANT!!! GitHub CI/CD could not found the `postgres-db:5432` by service name because CI/CD is external
    # It could not found `postgres-db`, so using `localhost:5432` to access from external host
    # 💡 Core Rule to Avoid Future Confusion:
    # - When running with Docker Compose (Local Machine or Production Environment):
    #   Containers share an isolated, internal Docker virtual network.
    #   Therefore, you must use the service name as the hostname (e.g., redis://redis-cache:6379).
    # - When running commands directly from a GitHub Actions Workflow:
    #   Commands execute directly on the host runner (outside the container network) and communicate through mapped ports.
    #   Consequently, all backing services (postgres, redis, mongodb, etc.) must be accessed via localhost.
    # ==============================================================================
    - name: 🔌 Generate Prisma Client & Sync Database Schema & 🌱 Seed Sample Data
      run: |
        cd sources
        cp prisma/schema.postgres.prisma prisma/schema.prisma
        DATABASE_URL="postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public&pgbouncer=true" DIRECT_DATABASE_URL="postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public" npx prisma generate
        DATABASE_URL="postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public&pgbouncer=true" DIRECT_DATABASE_URL="postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public" npx prisma db push
        DATABASE_URL="postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public&pgbouncer=true" DIRECT_DATABASE_URL="postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public" npx prisma db seed
      env:
        DATABASE_PROVIDER: "postgres"
        AUTH_PROVIDER: "custom"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom"
        DATABASE_URL: "postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public&pgbouncer=true"
        DIRECT_DATABASE_URL: "postgresql://postgres:postgres_secret_pass@localhost:5432/seats_reservation?schema=public"
        REDIS_URL: "redis://localhost:6379"
        JWT_SECRET: "github-actions-testing-secret-key-padding-2026"
        TOTAL_SEATS: "15"
        SHOULD_SEED: "true"

    - name: 🎭 Install Playwright Browser Binaries
      run: |
        cd sources
        npx playwright install --with-deps

    - name: 🚀 Run End-to-End Automation Test Matrix
      run: |
        cd sources
        npx playwright test --config=postgres-playwright.config.ts
      env:
        DATABASE_PROVIDER: "postgres"
        DATABASE_URL: "postgresql://postgres:password123@localhost:5432/seat_reservation?schema=public"
        DIRECT_DATABASE_URL: "postgresql://postgres:password123@localhost:5432/seat_reservation?schema=public"
        JWT_SECRET: "github-actions-testing-secret-key-padding-2026"
        TOTAL_SEATS: 12
        SHOULD_SEED: "true"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom" # custom local test

    - name: 📊 Upload Playwright HTML Test Report Artifacts
      uses: actions/upload-artifact@v4
      if: always()    # always push report for debug
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
 
  # ===================================================
  # 📋 REGRESSION & AUTOMATION E2E TEST (CI) - SQLITE
  # ===================================================
  sqlite-e2e-test:
    name: 🚀 [ SQLite ] Automated Playwright E2E Verification
    runs-on: ubuntu-latest

    services:
      # redis
      redis-cache:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
    - name: 📥 Check out repository code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 22.14
        # cache: 'npm'

    - name: 📦 Install Package Dependencies
      # run: npm ci
      run: |
        cd sources
        npm install
        npm ci

    # ==============================================================================
    # !!!IMPORTANT!!! GitHub CI/CD could not found the `postgres-db:5432` by service name because CI/CD is external
    # It could not found `postgres-db`, so using `localhost:5432` to access from external host
    # 💡 Core Rule to Avoid Future Confusion:
    # - When running with Docker Compose (Local Machine or Production Environment):
    #   Containers share an isolated, internal Docker virtual network.
    #   Therefore, you must use the service name as the hostname (e.g., redis://redis-cache:6379).
    # - When running commands directly from a GitHub Actions Workflow:
    #   Commands execute directly on the host runner (outside the container network) and communicate through mapped ports.
    #   Consequently, all backing services (postgres, redis, mongodb, etc.) must be accessed via localhost.
    # ==============================================================================
    - name: 🔌 Generate Prisma Client & Sync Database Schema & 🌱 Seed Sample Data
      run: |
        cd sources
        cp prisma/schema.sqlite.prisma prisma/schema.prisma
        DATABASE_URL="file:./sqlite-test.db" npx prisma generate
        DATABASE_URL="file:./sqlite-test.db" npx prisma db push
        DATABASE_URL="file:./sqlite-test.db" npx prisma db seed
      env:
        DATABASE_PROVIDER: "sqlite"
        AUTH_PROVIDER: "custom"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom"
        DATABASE_URL: "file:./sqlite-test.db"
        DIRECT_DATABASE_URL: "file:./sqlite-test.db"
        REDIS_URL: "redis://localhost:6379"
        JWT_SECRET: "github-actions-testing-secret-key-padding-2026"
        TOTAL_SEATS: "15"
        SHOULD_SEED: "true"

    - name: 🎭 Install Playwright Browser Binaries
      run: |
        cd sources
        npx playwright install --with-deps

    - name: 🚀 Run End-to-End Automation Test Matrix
      run: |
        cd sources
        npx playwright test --config=sqlite-playwright.config.ts
      env:
        DATABASE_PROVIDER: "sqlite"
        DATABASE_URL: "file:./sqlite-test.db"
        DIRECT_DATABASE_URL: "file:./sqlite-test.db"
        JWT_SECRET: "github-actions-testing-secret-key-padding-2026"
        TOTAL_SEATS: 12
        SHOULD_SEED: "true"
        NEXT_PUBLIC_AUTH_PROVIDER: "custom" # custom local test

    - name: 📊 Upload Playwright HTML Test Report Artifacts
      uses: actions/upload-artifact@v4
      if: always()    # always push report for debug
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7

  # ==============================================================================
  # 🏗️ COMPILE DOCKER IMAGE
  # ==============================================================================
  build-and-push-to-docker-hub:
    name: 🐳 Build & Push Image to DockerHub
    runs-on: ubuntu-latest
    needs: [ postgres-e2e-test, sqlite-e2e-test ]     # require test running successfully
    
    strategy:
      fail-fast: false
      matrix:
        # run parallel threads for services
        service:
          # postgres
          - name: seats-reservation-sqlite
            DATABASE_PROVIDER: postgres
          
          # sqlite
          - name: seats-reservation-postgres
            DATABASE_PROVIDER: sqlite
        
    steps:
      # Check out source code
      - name: ⬇️ Checkout Source Code
        uses: actions/checkout@v4

      # Login docker
      - name: 🔓 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      # Check DockerHub Repository: Auto creating repository if not existing on DockerHub
      - name: 🏗️ Auto-Create Docker Hub Repository If Not Exist
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          REPO_NAME="${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}"
          echo "🔍 Checking if repository $REPO_NAME exists on Docker Hub..."
          
          # 1. Request access token Base64 from GitHub configuration file
          AUTH_TOKEN=$(jq -r '.auths | to_entries | .[0].value.auth // empty' ~/.docker/config.json)
          
          if [ -z "$AUTH_TOKEN" ] || [ "$AUTH_TOKEN" = "null" ]; then
            echo "❌ Fallback: Native parsing failed. Trying explicit registry key..."
            AUTH_TOKEN=$(jq -r '.auths["https://docker.io"].auth // .auths["docker.io"].auth // empty' ~/.docker/config.json)
          fi
          
          if [ -z "$AUTH_TOKEN" ] || [ "$AUTH_TOKEN" = "null" ]; then
            echo "❌ Critical Error: Unable to extract token from Docker config."
            cat ~/.docker/config.json # export config.json to debug
            exit 1
          fi
          
          # 2. Call API to check the existing status of DockerHub Repository
          STATUS_CODE=$(curl -s -L -o /dev/null -w "%{http_code}" \
            -H "Authorization: Basic $AUTH_TOKEN" \
            https://docker.com)
          
          echo "📊 Docker Hub API responded with Status Code: $STATUS_CODE"
          
          if [ "$STATUS_CODE" = "404" ]; then
            echo "⚠️ Repository $REPO_NAME not found (Status 404). Initiating automatic creation..."
            
            # 3. Use jq to pack JSON
            CREATE_PAYLOAD=$(jq -n --arg n "$REPO_NAME" '{"name": $n, "description": ("Automated repository for " + $n), "is_private": false}')
            
            # 4. Call API to create new DockerHub Repository
            CREATE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Basic $AUTH_TOKEN" \
              -d "$CREATE_PAYLOAD" \
              https://docker.com)
              
            if [ "$CREATE_STATUS" = "201" ] || [ "$CREATE_STATUS" = "200" ]; then
              echo "✅ Successfully created repository: $REPO_NAME"
            else
              echo "❌ Failed to create repository. API returned status: $CREATE_STATUS"
              exit 1
            fi
          else
            echo "✅ Repository $REPO_NAME already exists (Status $STATUS_CODE). Skipping creation step."
          fi

      # Setup docker build kit
      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build and set Metadata labels to docker image
      - name: 🏗️ Build and Push Service Image
        uses: docker/build-push-action@v5
        with:
          context: ./sources            # build context from root folder
          file: ./sources/Dockerfile    # call service Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service }}
            DATABASE_PROVIDER=${{ matrix.service.DATABASE_PROVIDER }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title="Seats Reservation Management - ${{ matrix.service }} image"
            org.opencontainers.image.description="Production-grade web application for seats reservation platform management."
            org.opencontainers.image.vendor="hainguyenjc@gmail.com"
            org.opencontainers.image.authors="${{ secrets.DOCKERHUB_USERNAME }}"
            org.opencontainers.image.source="https://github.com{{ github.repository }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # Push README to Docker Hub UI
      - name: 📝 Update Docker Hub Short Description & Overview (README)
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          # ⚠️ NOTE: Use main docker-hub password (or Personal Access Token) to request write/modify rights
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # Docker Hub Repository
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}
          # Short Description - show for external search
          short-description: "Core distributed seats reservation web application [${{ matrix.service }}] built by GitHub Actions workflow execution automatically."
          # attach project README.md (Overview)
          # or if service has README.md, use: ./${{ matrix.service }}/README.md
          readme-filepath: ./README.md

  # ==============================================================================
  # 🌐 GCP DEPLOYMENT
  # ==============================================================================
  deploy-to-gcp:
    name: 🌐 Deploy to Google Cloud
    runs-on: ubuntu-latest
    needs: build-and-push-to-docker-hub      # require image has been built and pushed to DockerHub
    
    strategy:
      fail-fast: false
      matrix:
        # run parallel threads for services
        service:
          # postgres
          - name: seats-reservation-sqlite
            deploy_env_vars: |
              DATABASE_PROVIDER=postgres
              AUTH_PROVIDER=custom
              NEXT_PUBLIC_AUTH_PROVIDER=custom
              DATABASE_URL=postgresql://postgres:postgres_secret_pass@postgres-db:5432/seats_reservation?schema=public&pgbouncer=true
              DIRECT_DATABASE_URL=postgresql://postgres:postgres_secret_pass@postgres-db:5432/seats_reservation?schema=public
              REDIS_URL=${{ env.REDIS_URL }}
              JWT_SECRET=${{ env.JWT_SECRET }}
              TOTAL_SEATS=${{ env.TOTAL_SEATS }}
              SHOULD_SEED=${{ env.SHOULD_SEED }}
          
          # sqlite
          - name: seats-reservation-postgres
            deploy_env_vars: |
              DATABASE_PROVIDER=sqlite
              AUTH_PROVIDER=custom
              NEXT_PUBLIC_AUTH_PROVIDER=custom
              DATABASE_URL=file:./seats_reservation.db
              DIRECT_DATABASE_URL=file:./seats_reservation.db
              REDIS_URL=${{ env.REDIS_URL }}
              JWT_SECRET=${{ env.JWT_SECRET }}
              TOTAL_SEATS=${{ env.TOTAL_SEATS }}
              SHOULD_SEED=${{ env.SHOULD_SEED }}

    steps:
    # Login to Google Cloud by OIDC
    - name: 🔑 Authenticate to Google Cloud via OIDC
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    
    # Temporary Step: Convert deploy enviroment variables
    - name: 🔍 Format Environment Variables
      id: convert-deploy-env-vars
      run: |
        # Convert new line to comma (,)
        ENV_COMMA=$(echo "${{ matrix.service.deploy_env_vars }}" | tr '\n' ',' | sed 's/,$//' | sed 's/,*$//')
        echo "converted_env_vars=$ENV_COMMA" >> $GITHUB_OUTPUT

    # Deploy to Google Cloud Run by pulling image from Docker Hub
    - name: 🚀 Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: ${{ matrix.service }}
        region: ${{ env.GCP_REGION }}
        # Point to Public Docker Hub, no need to use Google Artifact Registry API due to be charged
        image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.service }}:latest
        
        # ⚠️ Parameter to force system running in Free Tier Forever
        flags: |
          --allow-unauthenticated
          --min-instances=0
          --max-instances=1
          --memory=512Mi
          --cpu=1
          --set-env-vars="${{ steps.convert-deploy-env-vars.outputs.converted_env_vars }}" # apply enviroment for docker image

