# -------------------------------------------------
# GUIDELINE: Need to do before deploying to GCP
# -------------------------------------------------
# - Create GCP Provider. Ex: github-seats-reservation
#   - Issuer URL. Ex: https://githubusercontent.com
#   - Allowed audiences. Ex: 1 - https://googleapis.com; 2 - https://iam.googleapis.com (generated by GitHub CI/CD, in GitHub CI/CD console is `//iam.googleapis.com/***`)
#     + Choose `Default audience` first to get the IAM path from URL to pass into GitHub secret as ${{ GCP_WORKLOAD_PROVIDER }}
#       Ex: projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#     + After getting IAM path, choose `Allowed audiences` to input as example
#     + Suggest to choose `Default audience`:
#       Ex: https://iam.googleapis.com/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#   - Add mapping:
#     + Default mapping 1:    google.subject        - OIDC: assertion.sub
#     + Add more mapping 2:   attribute.repository  - OIDC: assertion.repository
#   - Add mapping condition for new mapping attribute 2
#     Ex: assertion.repository == "<GitHub Username>/<GitHub Repository Name>"
# - Grant access permission for IAM Service Accounts (IAM Policy) by Cloud Shell:
#   `--member` parameter pattern:
#     + principalSet://<Allowed audaudience or googleapis.com>/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/<new attribute name. Ex: attribute.repository>/<assertion.repository value. Ex: <GitHub Username>/<GitHub Repository Name>
#   Ex: gcloud iam service-accounts add-iam-policy-binding "<Service Account Email. Ex: github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com>" \
#             --project="<GCP Project Number>" \
#             --role="roles/iam.workloadIdentityUser" \
#             --member="principalSet://<Allowed audaudience or googleapis.com>/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/<new attribute name. Ex: attribute.repository>/<assertion.repository value. Ex: <GitHub Username>/<GitHub Repository Name>"
# - Info:
#   Workfload Identity Pool IAM Principal Pattern:
#     principal://iam.googleapis.com/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/subject/SUBJECT_ATTRIBUTE_VALUE
# - GitHub GCP Secret ADC (generated by GCP Service Account Token Creation):
#   + GCP_ADC_JSON (Recommended for Simple Using): {
#       "type": "service_account",
#       "project_id": <GCP Project ID/Name>,
#       "private_key_id": <GCP Service Account Private Key ID>,
#       "private_key": <GCP Service Account Private Key ID. Ex: "-----BEGIN PRIVATE KEY-----\n{...Private Key...}\n-----END PRIVATE KEY-----\n",
#       "client_email": <GCP Service Account Client Email. Ex: abc@<GCP Project ID/Name>.iam.gserviceaccount.com>,
#       "client_id": <GCP Service Account Client ID>,
#       "auth_uri": <GCP OAuth2 Auth URI. Ex: https://accounts.google.com/o/oauth2/auth>,
#       "token_uri": <GCP OAuth2 Auth Token URI. Ex: https://oauth2.googleapis.com/token>,
#       "auth_provider_x509_cert_url": <GCP OAuth2 Auth Certificate (x509) URL. Ex: https://www.googleapis.com/oauth2/v1/certs>,
#       "client_x509_cert_url": <GCP OAuth2 Client Project Certificate (x509) URL. Ex: https://www.googleapis.com/robot/v1/metadata/x509/github-seats-reservation%40gcp-seats-reservation.iam.gserviceaccount.com>,
#       "universe_domain": <GCP Universe Domain. Ex: googleapis.com>
#   }
#   + GCP_SERVICE_ACCOUNT (Required for Authentication, Pulling Image from K8s/Docker): <GCP Service Account Email. Ex: github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com>
#   + GCP_WORKLOAD_PROVIDER:
#       projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#       Ex: projects/130619617539/locations/global/workloadIdentityPools/github-seats-reservation-pool/providers/github-seats-reservation
# - For PostgreSQL: Require using Cloud Run SQL, creating it on GCP first and collection information to connect:
#       Ex: postgresql://user:password@localhost/seats_reservation?host=/cloudsql/<Cloud SQL Connection Name. Ex: project-id:region:instance-id, like this: gcp-seats-reservation:us-central1:seats-postgres-db>
# - Back to GitHub and input the secret GCP_WORKLOAD_PROVIDER value that received from previous steps
# -------------------------------------------------

name: ☸️ [ GKE Deployment ] Seats Reservation Platform CI/CD Pipeline

on:
  # auto trigger workflow
  # push:
  #   branches: [ "master" ] # active when merge code into master
  # pull_request:
  #   branches: [ "master" ]
  
  # manual trigger workflow
  workflow_dispatch:
    inputs:
      region:
        description: "🌍 GCP Region (us-central1, us-east1, us-west1)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: us-central1    # Always Free
      machine_type:
        description: "⚙️ GKE Machine Type (e2-micro, e2-small, e2-medium)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: e2-small
      nodes_number:
        description: "⚙️ The number of GKE Machine Node"
        required: false         # not require, due to be triggered standalone
        type: number            # receive enviroment from parent workflow under JSON string
        default: 1
      cluster_disk_size:
        description: "⚙️ The disk size of GKE Cluster (Ex: 20GB)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: 20GB
      env_data:
        description: "🔧 Environment Variables (JSON)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: |
          [
            {
                "name":     "seats-reservation-sqlite",
                "env_vars": {
                    "K8S_DEPLOYMENT_DB_PROVIDER": "sqlite",
                    "K8S_DEPLOYMENT_NAMESPACE":   "gke-seats-reservation-sqlite",
                    "K8S_DEPLOYMENT_NAME":        "seats-reservation-deployment",
                    "K8S_DEPLOYMENT_SERVICE":     "seats-reservation-service-lb",
                    "K8S_DEPLOYMENT_SECRET":      "GKE_SECRET_SQLITE",
                    "K8S_DEPLOYMENT":             "./sources/.k8s/k8s-gke-deployment-sqlite.yml"
                }
            },
            {
                "name":     "seats-reservation-postgres",
                "env_vars": {
                    "K8S_DEPLOYMENT_DB_PROVIDER": "postgres",
                    "K8S_DEPLOYMENT_NAMESPACE":   "gke-seats-reservation-postgres",
                    "K8S_DEPLOYMENT_NAME":        "seats-reservation-deployment",
                    "K8S_DEPLOYMENT_SERVICE":     "seats-reservation-service-lb",
                    "K8S_DEPLOYMENT_SECRET":      "GKE_SECRET_POSTGRES",
                    "K8S_DEPLOYMENT":             "./sources/.k8s/k8s-gke-deployment-postgres.yml"
                }
            }
          ]
  
  # allow other workflow call into (inputs same as workflow_dispatch but required)
  workflow_call:
    inputs:
      region:
        description: "🌍 GCP Region (us-central1, us-east1, us-west1)"
        required: true          # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
      machine_type:
        description: "⚙️ GKE Machine Type (e2-micro, e2-small, e2-medium)"
        required: true          # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
      nodes_number:
        description: "⚙️ The number of GKE Machine Node"
        required: true          # not require, due to be triggered standalone
        type: number            # receive enviroment from parent workflow under JSON string
      cluster_disk_size:
        description: "⚙️ The disk size of GKE Cluster (Ex: 20GB)"
        required: true          # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
      env_data:
        description: "🔧 Environment Variables (JSON)"
        required: true          # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: write
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # ==============================================================================
  # 🌐 GKE DEPLOYMENT
  # ==============================================================================
  deploy-to-gke:
    name: 🌐 [ GKE ] Deploy to Google Cloud
    runs-on: ubuntu-latest
    # needs: build-and-push-to-docker-hub      # not require test running, due to be triggered standalone
    
    # load services configuraion
    strategy:
      fail-fast: false
      matrix:
        # run parallel threads for services
        service: ${{ fromJson(inputs.env_data) }}

    steps:
      # 1. Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_GKE_DEPLOY: ${{ secrets.ALLOW_GKE_DEPLOY }}
        if: ${{ env.ALLOW_GKE_DEPLOY != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_GKE_DEPLOY is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # 2. Check out source code
      - name: ⬇️ Checkout Source Code
        if: success()                 # if previous step is successful
        uses: actions/checkout@v4
      
      # 3. Login to Google Cloud by Google OAuth2 ADC
      - name: 🔑 Authenticate to Google Cloud via Google OAuth2 ADC
        if: success()                 # if previous step is successful
        uses: google-github-actions/auth@v2
        with:
          # authenticate via OIDC
          # workload_identity_provider: "projects/130619617539/locations/global/workloadIdentityPools/github-seats-reservation-pool/providers/github-seats-reservation" # ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          # service_account: "github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com" # ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # authenticate via Google OAuth2 ADC JSON
          credentials_json: ${{ secrets.GCP_ADC_JSON }}
          token_format: 'access_token'        # debug token
          access_token_lifetime: '3300s'      # extend time due to be differnt timezone
          create_credentials_file: true       # export credentials for next steps
          export_environment_variables: true  # export enviroment variables for next steps
      
      # require cloud SDK
      - name: 🛠️ Set up Cloud SDK
        if: success()                 # if previous step is successful
        uses: google-github-actions/setup-gcloud@v2
      
      # require docker client to config GCP registry
      - name: 🛠️ Configure Docker Client for GCP Registry
        if: success()                 # if previous step is successful
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev
      
      # ==============================================================================
      # 🌐 !!!IMPORTANT!!! Require to re-build immutable image and push it to GCP Registry, not using the built image from DockerHub because:
      # 1. Pulling Time, Bandwidth and Scaling Cost:
      # - DockerHub: when GKE need to scale up, it must download image from DockerHub to re-scale. This will make cost increasing (egress fees)
      # and make scaling process longer than immutable image
      # - GCP Registry: in same network with GCP Deployment Virtual Server/Network, so it's in same internal network (bandwidth is free, and fastest)
      # 2. Private Network Execution (Strongest Security)
      # 3. The image is immutable via SHA code (github.sha):
      # - DockerHub: if 2 virtual K8s machine pull image at 2 different time, then they could run 2 different versions of code.
      # - GCP SHA: it's only one uniqued SHA version, so GCP K8s virtual machines will run same code version when scaling
      # ==============================================================================
      # 4. Require docker build kit
      - name: 🛠️ Set up Docker Buildx
        if: success()                 # if previous step is successful
        uses: docker/setup-buildx-action@v3
        with:
          # back to use default builder if new instance is error by stucking network
          fallback-to-driver: docker
      
      # 5. Check and create GKE image repository if not existing
      - name: 📦 Ensure Artifact Registry Repository Exists
        if: success()                 # if previous step is successful
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GKE_REPOSITORY: ${{ github.event.repository.name }}
          GCP_REGION: ${{ inputs.region }}
        run: |
          # request repository information from GCP
          echo "📦 Checking if repository '$GKE_REPOSITORY' exists in region '${{ inputs.region }}'..."
          CREATE_OUTPUT=$(gcloud artifacts repositories create "$GKE_REPOSITORY" \
              --repository-format=docker \
              --location="$GCP_REGION" \
              --description="Automated Docker repository created via GitHub Actions CI/CD Pipeline" \
              --quiet 2>&1) || CREATE_EXIT_CODE=$?
          if [ -z "$CREATE_EXIT_CODE" ] || [ "$CREATE_EXIT_CODE" -eq 0 ]; then
            echo "✅ Success: Repository '$REPO_NAME' created for the first time."
          else
            # 🔥 if 409: if Google responsed ALREADY_EXISTS, force pipeline continue
            if echo "$CREATE_OUTPUT" | grep -q "ALREADY_EXISTS"; then
              echo "========================================================================="
              echo "✅ Notice: Repository '$REPO_NAME' already exists on GCP (Bypassing 409 conflict safely)."
              echo "Proceeding directly to the application container compilation layer."
              echo "========================================================================="
            else
              # other error (Ex: Permission Denied), stop pipeline
              echo "❌ Fatal Error: Google Cloud API rejected operation with code $CREATE_EXIT_CODE"
              echo "$CREATE_OUTPUT"
              exit 1
            fi
          fi
      
      # 6. Check GKE cluster, if not found, then creating it.
      # !!!IMPORTANT!! Use one cluster for both SQLite/Postgres, so use GitHub repository name to save the cost
      # Requires GCP Kubernetes Engine Admin Rights to create
      - name: 📦 Ensure GKE Cluster Exists (Auto-Provision Hardware)
        if: success()                 # if previous step is successful
        env:
          GKE_CLUSTER: ${{ github.event.repository.name }}-cluster
          GCP_REGION: ${{ inputs.region }}
          GKE_MACHINE_TYPE: ${{ inputs.machine_type }}
          GKE_NODES_NUMBER: ${{ inputs.nodes_number }}
          GKE_CLUSTER_DISK_SIZE: ${{ inputs.cluster_disk_size }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
        run: |
          CLUSTER_NAME="$GKE_CLUSTER"
          REGION_NAME="$GCP_REGION"
          MACHINE_TYPE="$GKE_MACHINE_TYPE"
          NODES_NUMBER="$GKE_NODES_NUMBER"
          CLUSTER_DISK_SIZE="$GKE_CLUSTER_DISK_SIZE"
          PROJECT_ID="$GCP_PROJECT_ID"
          
          echo "========================================================================="
          echo "🕵️‍♂️ AUTOMATICALLY EXTRACTING SERVICE ACCOUNT EMAIL FROM ADC JSON KEY"
          echo "========================================================================="
          # Use Node.js to read file JSON and find "client_email"
          GCP_SA_EMAIL=$(node -e "const data = JSON.parse(process.env.GCP_ADC_JSON); console.log(data.client_email);")
          echo "Checking if physical GKE Cluster '$CLUSTER_NAME' exists in region '$REGION_NAME'. Project: '$PROJECT_ID' | Service Account:  '$GCP_SA_EMAIL'..."
          
          # 🎯 1. Receive Response to check Error from create command
          # -------------------------------------------------
          # `e-micro`:
          # -------------------------------------------------
          # no scaling, no logs, no balancing (smallest if possible)
          # CREATE_OUTPUT=$(gcloud container clusters create "$CLUSTER_NAME" \
          #     --service-account="$GCP_SA_EMAIL" \
          #     --region="$REGION_NAME" \
          #     --num-nodes=$NODES_NUMBER \
          #     --machine-type="$MACHINE_TYPE" \
          #     --disk-size="$CLUSTER_DISK_SIZE" \
          #     --workload-pool="$PROJECT_ID.svc.id.goog" \
          #     --workload-metadata=GKE_METADATA \
          #     --no-enable-autoscaling \
          #     --logging=NONE \
          #     --monitoring=NONE \
          #     --disable-addons=HorizontalPodAutoscaler,HttpLoadBalancing \
          #     --async \
          #     --quiet 2>&1) || CREATE_EXIT_CODE=$?
          # -------------------------------------------------
          # `e-small`:
          # -------------------------------------------------
          # no logs
          CREATE_OUTPUT=$(gcloud container clusters create "$CLUSTER_NAME" \
              --service-account="$GCP_SA_EMAIL" \
              --region="$REGION_NAME" \
              --num-nodes=$NODES_NUMBER \
              --machine-type="$MACHINE_TYPE" \
              --disk-size="$CLUSTER_DISK_SIZE" \
              --workload-pool="$PROJECT_ID.svc.id.goog" \
              --workload-metadata=GKE_METADATA \
              --enable-autoscaling --min-nodes=1 --max-nodes=2 \
              --enable-master-authorized-networks \
              --master-authorized-networks 0.0.0.0/0 \
              --addons=HttpLoadBalancing \
              --logging=NONE \
              --monitoring=NONE \
              --async \
              --quiet 2>&1) || CREATE_EXIT_CODE=$?
          
          # Check reposne Google Cloud Engine API
          if [ -z "$CREATE_EXIT_CODE" ] || [ "$CREATE_EXIT_CODE" -eq 0 ]; then
            echo "✅ Success: GKE Cluster infrastructure dispatched for the first time."
          else
            # 🔥 Check 409: if error is Already exists / ALREADY_EXISTS, bypass to continue
            if echo "$CREATE_OUTPUT" | grep -q -i "already exists"; then
              echo "========================================================================="
              echo "✅ Notice: GKE Cluster '$CLUSTER_NAME' already exists on Google Cloud."
              echo "Bypassing 409 conflict safely. Proceeding directly to software layers."
              echo "========================================================================="
            else
              # other error (Ex: Not enough quota or permission denied), stop pipeline
              echo "❌ Fatal Error: Google Cloud Infrastructure Layer rejected operation with code $CREATE_EXIT_CODE"
              echo "$CREATE_OUTPUT"
              exit 1
            fi
          fi
          
          # 2. Smart Wait Loop
          # Loop every 30 seconds to ask GCP whether cluster is 'RUNNING'.
          # to avoid pipeline timeout and other push code requests not stuck by this.
          echo "🛸 Hardware creation dispatched. Initiating smart monitoring loop..."
          ATTEMPT=1
          MAX_ATTEMPTS=5
          DELAY_TIME=30
          EXCEEDED_TIME=$((MAX_ATTEMPTS * DELAY_TIME))
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            STATUS=$(gcloud container clusters describe "$CLUSTER_NAME" --region="$REGION_NAME" --format="value(status)" 2>/dev/null || echo "PROVISIONING")
            echo "Current GKE Infrastructure Status: [ $STATUS ]"
            
            if [ "$STATUS" = "RUNNING" ]; then
              echo "✅ GKE Cluster hardware is fully assembled and live! Proceeding to software layer."
              break
            elif [ "$STATUS" = "STOPPING" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "DEGRADED" ]; then
              echo "❌ GKE Hardware initialization failed with status: $STATUS (timeout $EXCEEDED_TIME seconds)"
              exit 1
            fi
            
            echo "⚠️ Waiting $DELAY_TIME seconds for Google Cloud infrastructure layer to complete..."
            ATTEMPT=$((ATTEMPT + 1))
            sleep $DELAY_TIME
          done
      
      # 7. Build immutable image and push to GCP Registry
      - name: 🏗️ Build and Push Production Image to GCP Registry
        if: success()                 # if previous step is successful
        uses: docker/build-push-action@v6
        with:
          context: ./sources
          file: ./sources/Dockerfile
          push: true
          build-args: |
            SERVICE_NAME=${{ matrix.service.name }}
            DATABASE_PROVIDER=${{ matrix.service.env_vars.K8S_DEPLOYMENT_DB_PROVIDER }}
            BUILD_MODE=production
          # tag image name must follow Google Artifact Registry Standards.
          # Ex: <region>-docker.pkg.dev/<GCP_PROJECT_ID>/<GCP Repository Name>/<Immutable K8s Image Name>:<unique SHA>
          tags: ${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ github.event.repository.name }}/${{ matrix.service.name }}:${{ github.sha }}
          labels: |
            org.opencontainers.image.title="Seats Reservation Management - ${{ matrix.service.name }} image"
            org.opencontainers.image.description="Production-grade web application for seats reservation platform management."
            org.opencontainers.image.vendor="hainguyenjc@gmail.com"
            org.opencontainers.image.authors="${{ secrets.DOCKERHUB_USERNAME }}"
            org.opencontainers.image.source="https://github.com{{ github.repository }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 8. Install GKE Cloud Authetication Plugin
      - name: ⚙️ Install and Configure GKE Gcloud Auth Plugin for Kubectl
        if: success()                 # if previous step is successful
        uses: google-github-actions/setup-gcloud@v2
        with:
          # 🎯 Google action will download and install this component,
          # and apply gke-gcloud-auth-plugin automatically
          install_components: 'gke-gcloud-auth-plugin'
      
      # 9. Require GKE credentials to deploy
      # - name: 🔑 Require GKE Cluster Credentials
        # if: success()                 # if previous step is successful
        # uses: google-github-actions/get-gke-credentials@v2
        # with:
          # # !!!IMPORTANT!! Use one cluster for both SQLite/Postgres, so use GitHub repository name to save the cost
          # cluster_name: ${{ github.event.repository.name }}-cluster
          # location: ${{ inputs.region }}
          # project_id: ${{ secrets.GCP_PROJECT_ID }}
      - name: 🔑 Require GKE Cluster Credentials via Cloud SDK
        if: success()                 # if previous step is successful
        env:
          GKE_CLUSTER: ${{ github.event.repository.name }}-cluster
          GCP_REGION: ${{ inputs.region }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "========================================================================="
          echo "🔑 FETCHING KUBECONFIG CONTEXT VIA NATIVE GCLOUD CLIENT"
          echo "========================================================================="
          CLUSTER_NAME="$GKE_CLUSTER"
          REGION_NAME="$GCP_REGION"
          
          # request GKE credentials for regional (make sure cluster has been created by `--region` on step ensuring the existing cluster)
          gcloud container clusters get-credentials "$CLUSTER_NAME" --region="$REGION_NAME" --project="$GCP_PROJECT_ID" --quiet || exit 1
      
      # 10. Check GKE Namespace, if not found, then creating it.
      # !!!IMPORTANT!! Use one cluster for both SQLite/Postgres, so use GitHub repository name to save the cost
      # Requires GCP Kubernetes Engine Admin Rights to create
      - name: 📦 Ensure Target Kubernetes Namespace Exists
        if: success()                 # if previous step is successful
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
        run: |
          # Auto check: if not existing, then creating it. Else, skip safe
          echo "Validating infrastructure partition status on GKE cluster..."
          kubectl create namespace $K8S_DEPLOYMENT_NAMESPACE --dry-run=client -o yaml | kubectl apply -f - --validate=false
      
      # 11. Bind GKE Service Account for pulling image on GCP Repository
      - name: 🔗 Bind GKE Service Account to Google IAM Role (Workload Identity)
        if: success()                 # if previous step is successful
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "========================================================================="
          echo "🕵️‍♂️ AUTOMATICALLY EXTRACTING SERVICE ACCOUNT EMAIL FROM ADC JSON KEY"
          echo "========================================================================="
          # Use Node.js to read file JSON and find "client_email"
          GCP_SA_EMAIL=$(node -e "const data = JSON.parse(process.env.GCP_ADC_JSON); console.log(data.client_email);")
          # # debug
          # echo "- Detected Identity Email: $GCP_SA_EMAIL | Namespace: $K8S_DEPLOYMENT_NAMESPACE"
          
          echo "========================================================================="
          echo "🛠️ CREATING KUBERNETES SERVICE ACCOUNT OBJECT"
          echo "========================================================================="
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: gcp-service-account-runner
            namespace: $K8S_DEPLOYMENT_NAMESPACE
            annotations:
              iam.gke.io/gcp-service-account: $GCP_SA_EMAIL
          EOF
          # # debug
          # echo "--- Content Verified ---"
          # cat <<EOF
          # apiVersion: v1
          # kind: ServiceAccount
          # metadata:
          #   name: gcp-service-account-runner
          #   namespace: $K8S_DEPLOYMENT_NAMESPACE
          #   annotations:
          #     iam.gke.io/gcp-service-account: $GCP_SA_EMAIL
          # EOF
          
          echo "========================================================================="
          echo "🔐 EXECUTING WORKLOAD IDENTITY BINDING VIA DYNAMIC ADC CREDENTIALS"
          echo "========================================================================="
          # !!!IMPORTANT!!! Due to multiple parallel jobs did this step, so they maybe conflict;
          # so retrying 3 times (interval 3 seconds, and double after every retry time) when conflicting
            
          # IAM Roles to binding
          # - VM Hardware: roles/container.defaultNodeServiceAccount, roles/logging.logWriter, roles/monitoring.metricWriter
          # - Workload Identity (App/Pod): roles/iam.workloadIdentityUser
          # - App/Pod Bussiness Logic: roles/storage.objectViewer, roles/storage.objectAdmin, roles/secretmanager.secretAccessor, roles/cloudsql.client
          ROLES=(
            "roles/iam.workloadIdentityUser"
          )
            
          for ROLE in "${ROLES[@]}"; do
            ATTEMPT=1
            MAX_ATTEMPTS=3
            DELAY=3
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              echo "-> [ ${ROLE} ] Attempt $ATTEMPT/$MAX_ATTEMPTS: Dispatching IAM policy synchronization..."
              
              # Load $GCP_SA_EMAIL to gcloud
              BIND_OUTPUT=$(gcloud iam service-accounts add-iam-policy-binding "$GCP_SA_EMAIL" \
                  --role="${ROLE}" \
                  --member="serviceAccount:${GCP_PROJECT_ID}.svc.id.goog[${K8S_DEPLOYMENT_NAMESPACE}/gcp-service-account-runner]" \
                  --project="${GCP_PROJECT_ID}" \
                  --quiet 2>&1) && BIND_SUCCESS=true
              if [ "$BIND_SUCCESS" = true ]; then
                echo "✅ [ ${ROLE} ] Success: IAM policy binding applied seamlessly."
                break
              else
                # if conflicting (concurrent policy changes) of matrix parallel services
                if echo "$BIND_OUTPUT" | grep -q -i "concurrent policy changes"; then
                  echo "::warning::⚠️ [ ${ROLE} ] GCP IAM Lock caught. Another matrix pipeline is writing. Retrying in ${DELAY}s..."
                  sleep $DELAY
                  DELAY=$((DELAY * 2))
                  ATTEMPT=$((ATTEMPT + 1))
                else
                  # other error (Ex: wrong configuration or permission denied), stop pipeline
                  echo "❌ [ ${ROLE} ] Fatal Error: Google Cloud IAM API rejected operation."
                  echo "$BIND_OUTPUT"
                  exit 1
                fi
              fi
            
              # Reset for looping
              unset BIND_SUCCESS
              
              if [ $ATTEMPT -gt $MAX_ATTEMPTS ]; then
                echo "❌ [ ${ROLE} ] Fatal: Exceeded maximum retry gates due to heavy concurrent contention."
                exit 1
              fi
            done
          done
      
      # -------------------------------------------------
      # 12. Create secret to adapt into K8s deployment:
      # - GKE_SECRET_POSTGRES: {
      #     "name": <K8s Secret Name. Ex: seats-reservation-secret>,
      #     "namespace": <K8s Secret Namespace. Ex: gke-seats-reservation-postgres>,
      #     "env": {
      #       "DATABASE_URL": <Postgres Poller/PgBounder JDBC ConnectionString>,
      #       "DIRECT_DATABASE_URL": <Postgres Directly JDBC ConnectionString>,
      #       "JWT_SECRET": <JWT Token>
      #     }
      #   }
      # - GKE_SECRET_SQLITE: {
      #     "name": <K8s Secret Name. Ex: seats-reservation-secret>,
      #     "namespace": <K8s Secret Namespace. Ex: gke-seats-reservation-sqlite>,
      #     "env": {
      #       "DATABASE_URL": <Path of SQLite DB File>,
      #       "DIRECT_DATABASE_URL": <Path of SQLite DB File>,
      #       "JWT_SECRET": <JWT Token>
      #     }
      #   }
      # -------------------------------------------------
      - name: 🔐 Advanced Universal JSON Secret Provisioner for GKE
        env:
          # GitHub Secret Name to parse for GKE secret if neccessary
          # Ex: inputs.github_secret_name chứa chữ "G_POSTGRES_JSON"
          K8S_DEPLOYMENT_SECRET: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_SECRET }}
          # Load all GitHub secret to parse
          ALL_GITHUB_SECRETS: ${{ toJSON(secrets) }}
        if: success() && env.K8S_DEPLOYMENT_SECRET != null && env.K8S_DEPLOYMENT_SECRET != ''    # if previous step is successful
        run: |
          # Extract raw JSON based on the secret key name
          echo "========================================================================="
          echo "🗜️ Extracting value for Secret Key: [ $K8S_DEPLOYMENT_SECRET ]"
          echo "========================================================================="
          RAW_JSON_VALUE=$(echo "$ALL_GITHUB_SECRETS" | jq -r ".\"$K8S_DEPLOYMENT_SECRET\"" 2>/dev/null || echo "")
          if [ -z "$RAW_JSON_VALUE" ] || [ "$RAW_JSON_VALUE" = "null" ]; then
            echo "::warning::⚠️ GitHub Secret '$K8S_DEPLOYMENT_SECRET' is either empty or does not exist. Skipping."
            exit 0
          fi
          
          # Extract GKE Secret Name/Namespace from the extracted GitHub Secret JSON
          echo "========================================================================="
          echo "🕵️‍♂️ PARSING METADATA FROM DYNAMIC JSON CONTENT"
          echo "========================================================================="
          # Extract GKE secret name/namespace from the extracted GitHub Secret by key
          GKE_SECRET_NAME=$(echo "$RAW_JSON_VALUE" | jq -r '.name' 2>/dev/null || echo "")
          GKE_NAMESPACE=$(echo "$RAW_JSON_VALUE" | jq -r '.namespace' 2>/dev/null || echo "")
          if [ -z "$GKE_SECRET_NAME" ] || [ "$GKE_SECRET_NAME" = "null" ] || [ -z "$GKE_NAMESPACE" ] || [ "$GKE_NAMESPACE" = "null" ]; then
            echo "❌ Fatal Error: Missing 'name' or 'namespace' in JSON payload. Aborting!"
            exit 1
          else
            echo "- 📝 Target GKE Secret Object: $GKE_SECRET_NAME"
            echo "- 📝 Target GKE Namespace: $GKE_NAMESPACE"
          fi
          
          # Calculate the K8s command to create the GKE secret
          echo "========================================================================="
          echo "🚀 DYNAMICALLY GENERATING KUBERNETES SECRETS FROM ENV OBJECT"
          echo "========================================================================="
          KUBECTL_CMD="kubectl create secret generic \"$GKE_SECRET_NAME\" --dry-run=client -o yaml"
          
          # 🎯 Loop via enviroment variables from the 'env' JSON of the extracted GitHub Secret JSON by key
          # Use `--from-literal='KEY=VALUE'`
          while IFS='=' read -r key value; do
            if [ ! -z "$key" ]; then
              echo "-> Mapping environment variable payload: $key"
              KUBECTL_CMD="$KUBECTL_CMD --from-literal=\"$key\"=\"$value\""
            fi
          done < <(echo "$RAW_JSON_VALUE" | jq -r '.env | to_entries[] | "\(.key)=\(.value)"' 2>/dev/null)
          
          # 🎯 Final step: Combine GKE Kubernetes Command and apply to create GKE secret
          echo "- 📝 Transmitting orchestrated payload to Google Cloud Engine..."
          eval "$KUBECTL_CMD" | kubectl apply -f - -n "$GKE_NAMESPACE"
          
          echo "✅ Success: Dynamic K8s Secret has been fully established in the partition room!"
      
      # 13. Deploy to Google Cloud Run GKE by built image
      - name: 🌐 Dynamically Update Kubernetes Context & Deploy
        if: success()                 # if previous step is successful
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REPOSITORY: ${{ github.event.repository.name }}
          GCP_SERVICE: ${{ matrix.service.name }}
          GCP_SERVICE_REGION: ${{ inputs.region }}
          GKE_DEPLOYMENT_FILE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          echo "========================================================================="
          echo "🧹 STEP 1: PURGING STALE CACHED DEPLOYMENTS FROM GKE INFRASTRUCTURE"
          echo "========================================================================="
          # 🔥 delete old deployment to avoid cache out of namespace
          kubectl delete deployment seats-reservation-deployment -n ${{ matrix.service.namespace }} --ignore-not-found=true || true
          
          echo "========================================================================="
          echo "🔄 STEP 2: INJECTING DYNAMIC REGISTRY PATH INTO MANIFEST"
          echo "========================================================================="
          # fix k8s deployment image yml file by region
          # image tags: ${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ github.event.repository.name }}/${{ matrix.service.name }}:${{ github.sha }}
          sed -i "s|PLACEHOLDER_GKE_REGISTRY_IMAGE|${GCP_SERVICE_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_REPOSITORY}/${GCP_SERVICE}:${IMAGE_SHA}|g" $GKE_DEPLOYMENT_FILE
          # fix k8s deployment service account runner yml file for pulling image when deploying
          sed -i "s|PLACEHOLDER_GCP_SERVICE_ACCOUNT_RUNNER|gcp-service-account-runner|g" $GKE_DEPLOYMENT_FILE
          # # debug
          # cat $GKE_DEPLOYMENT_FILE
          
          echo "========================================================================="
          echo "🚀 STEP 3: APPLYING FRESH IMMUTABLE MANIFEST TO GKE CLUSTER"
          echo "========================================================================="
          kubectl apply -f $GKE_DEPLOYMENT_FILE --force
      
      # 14. Check deployment status
      - name: 📊 Check Rollout Status & Extract Deployment Metadata
        if: success()                 # if previous step is successful
        id: gke_cloud_run_deployment_check
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAME }}
          K8S_DEPLOYMENT_SERVICE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_SERVICE }}
        run: |
          TIMEOUT="300s" # 5 minutes
          
          echo "========================================================================="
          echo "🚀 1. MONITORING KUBERNETES ROLLING UPDATE STATUS"
          echo "========================================================================="
          # Force CI/CD wait until GKE Pods running successful
          # If having error (CrashLoopBackOff, ImagePullBackOff), this line will show error and stop pipeline (Fail-Fast)
          if ! kubectl rollout status deployment/$K8S_DEPLOYMENT_NAME -n $K8S_DEPLOYMENT_NAMESPACE --timeout=$TIMEOUT; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Rollout Status] before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "📦 2. CURRENT RUNNING PODS & CONTAINER STATUS"
          echo "========================================================================="
          # Print to trace running pods, number of instances (Replicas) and status
          if ! kubectl get pods -l app=$K8S_DEPLOYMENT_NAME -o wide -n $K8S_DEPLOYMENT_NAMESPACE; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Pods] before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "🌐 3. EXTRACTING NETWORK ENDPOINTS (EXTERNAL IP & SERVICE PORTS)"
          echo "========================================================================="
          # Wait for public information (IP, access port)
          echo "- Waiting for GCP LoadBalancer to allocate a public IP..."
          kubectl wait --namespace $K8S_DEPLOYMENT_NAMESPACE --for=jsonpath='{.status.loadBalancer.ingress.ip}' service/$K8S_DEPLOYMENT_SERVICE --timeout=$TIMEOUT 2>&1 || true
          
          # Request public information (IP, access port)
          if ! SERVICE_TABLE=$(kubectl get service $K8S_DEPLOYMENT_SERVICE -n $K8S_DEPLOYMENT_NAMESPACE 2>&1 | tee /dev/stdout); then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Service] $K8S_DEPLOYMENT_SERVICE (namespace=$K8S_DEPLOYMENT_NAMESPACE) or reached $TIMEOUT timeout boundary."
            echo "Bypassing hard error check to prevent pipeline failure."
            EXTERNAL_IP=""
          
          else
            # 🎯 Read information from the responsed table info
            # Column No. 4 ($4) is EXTERNAL-IP, Column No. 5 ($5) is PORT(S) under format '80:31234/TCP'
            RAW_IP=$(echo "$SERVICE_TABLE" | awk 'NR==2 {print $4}')
            if [[ "$RAW_IP" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              EXTERNAL_IP="$RAW_IP"
              # Split Port from Column No. 5 (Ex: 80)
              SERVICE_PORT=$(echo "$SERVICE_TABLE" | awk 'NR==2 {print $5}' | cut -d':' -f1)
            else
              echo "⚠️ Warning: Captured invalid IP format from table output: [$RAW_IP]. Setting EXTERNAL_IP to empty."
              EXTERNAL_IP=""
            fi
          fi
          
          echo "========================================================================="
          echo "📜 4. STREAMING LIVE APPLICATION BOOT LOGS"
          echo "========================================================================="
          # Print first 50 lines when container started
          # to check whether application start successful
          if ! kubectl logs deployment/$K8S_DEPLOYMENT_NAME --tail=50 --all-containers=true -n $K8S_DEPLOYMENT_NAMESPACE; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Logs] deployment/$K8S_DEPLOYMENT_NAME (namespace=$K8S_DEPLOYMENT_NAMESPACE) before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "📜 5. CALCULATE THE GKE PUBLIC URL"
          echo "========================================================================="
          # Calculate if after delay time, and could not get the external IP (Ex: GKE Hardware Stuck)
          PUBLIC_URL=""
          if [ -z "$EXTERNAL_IP" ] || [ "$EXTERNAL_IP" == "<pending>" ] || [ "$EXTERNAL_IP" == "<none>" ]; then
            echo "::warning::⚠️ GCP LoadBalancer failed to allocate a public IP within $TIMEOUT. Retry once more time to detect the GKE Public URL."
          
          else
            # Calculate the public URL (Sử dụng luôn $SERVICE_PORT vừa bốc từ bảng trên, không gọi lại lệnh jsonpath nữa)
            PUBLIC_URL="http://${EXTERNAL_IP}:${SERVICE_PORT}"
            echo "✅ Production-Ready Live Link Calculated: $PUBLIC_URL"
            
            # 🎯 Mẹo in thông báo nổi bật màu xanh lá cây bấm được ngay tại trang log chính
            echo "::notice title=💡 Deployment Live Endpoint::Your application is running smoothly at: $PUBLIC_URL"
            
            # 🎯 Mẹo viết bảng báo cáo ra màn hình Summary bên ngoài GitHub UI để nhà tuyển dụng dễ click
            echo "### 💡 Live Deployment Metadata Info" >> $GITHUB_STEP_SUMMARY
            echo "* **Matrix Target Name:** \`${{ matrix.service.name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Kubernetes Room (Namespace):** \`$K8S_DEPLOYMENT_NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Clickable Production Endpoint Link:** [$PUBLIC_URL]($PUBLIC_URL)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "gke_cloud_run_url=$PUBLIC_URL" >> $GITHUB_OUTPUT
      
      # 15. Save service published information to an temporary artifact for next step
      - name: 💾 Save Service URL to Temp File
        if: success()                 # if previous step is successful
        run: |
          # create a JSON file to keep the published information
          echo '{"name": "gke-${{ matrix.service.name }}", "published_url": "${{ steps.gke_cloud_run_deployment_check.outputs.gke_cloud_run_url }}", "encoded": "false"}' > "gke-${{ matrix.service.name }}.json"
      
      # 15.1. Upload published service JSON to an temporary artifact
      - name: 📦 Upload Published Service Information Artifact
        if: success()                 # if previous step is successful
        uses: actions/upload-artifact@v4
        with:
          # Unique artifact name by service to avoid conflicted/overwritten
          name: gke-url-${{ matrix.service.name }}
          path: "gke-${{ matrix.service.name }}.json"
  
  # ==============================================================================
  # 🛠️ COMBINE PUBLISHED URL(s) BY SERVICE
  # ==============================================================================
  combine-published-urls-by-service:
    name: 🌐 Combine Published URL(s) to update README.md
    runs-on: ubuntu-latest
    needs: [ deploy-to-gke ]                        # wait for deployment
    
    # output for next job
    outputs:
      published-services: ${{ steps.build_published_services.outputs.published-services }}
    
    steps:
      # 1. Download Published Service Information Artifact from previous job to combine
      - name: 📥 Download All Service Artifacts
        uses: actions/download-artifact@v4
        with:
          # Use pattern (*) to download all artifacts with prefix `gke-url-` to same folder
          pattern: gke-url-*
          path: temp-gke-urls
          merge-multiple: true # Merge all files `.json` to `temp-gke-urls` folder
      
      # 2. Read artifact folder to combine published information
      - name: 🛠️ Combine Published URL(s) to Enviroment JSON Variables
        id: build_published_services
        run: |
          echo "1. Artifact JSON files:"
          ls -la temp-gke-urls/
          
          echo "----------------------------------------"
          echo "2. Combine all JSON files..."
          # Check if not found any json file
          if [ ! -d "temp-gke-urls" ] || [ -z "$(ls -A temp-gke-urls/gke-*.json 2>/dev/null)" ]; then
            echo "❌ Not found any published information `.json` file."
            exit 1
          fi
          
          # Use `jq` to read all `.json` file and collect to JSON array
          PUBLISHED_SERVICES=$(jq -s -c '.' temp-gke-urls/gke-*.json)
          echo "🏃 Published Services:"
          echo "$PUBLISHED_SERVICES"
          echo "published-services=$PUBLISHED_SERVICES" >> $GITHUB_OUTPUT
  
  # ==============================================================================
  # ⚡ PUBLISH URL TO README
  # ==============================================================================
  publish-url-to-readme:
    name: ⚡ Generate and Export GCP/GKE Links to README
    needs: [ deploy-to-gke, combine-published-urls-by-service ]           # wait for deployment, combine enviroment
    secrets: inherit # bypass secrets to child workflow
    uses: ./.github/workflows/ci-cd-publish-url.yml
    with:
      env_data: ${{ needs.combine-published-urls-by-service.outputs.published-services }}
  
  # ==============================================================================
  # ⚙️ CLEAN UP
  # ==============================================================================
  clean-up:
    name: ⚙️ Force Kill Orphan Processes
    runs-on: ubuntu-latest
    needs: [ deploy-to-gke, publish-url-to-readme ]           # wait for deployment, combine enviroment
    # always run although other jobs are success or failure
    if: ${{ !cancelled() }}
    
    steps:
      # Clean up temporary artifact
      - name: 🧹 Clean up Temp Artifacts from GitHub Storage
        if: always()    # Always run to clean up
        uses: geekyeggo/delete-artifact@v5
        with:
          # Use pattern (*) to delete all artifacts with prefix `gke-url-`
          name: gke-url-*
      
      # Clean up
      - name: ⚙️ Force Kill Orphan Processes
        if: always()    # Always run to clean up
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAME }}
          K8S_DEPLOYMENT_SERVICE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_SERVICE }}
        run: |
          echo "========================================================================="
          echo "📊 REAL-TIME CLUSTER RESOURCE UTILIZATION (DEBUG HOOK)"
          echo "========================================================================="
          # Print out % RAM/CPU Node Resource (|| true to void stop pipeline while metrics-server is busy)
          echo "- Checking real-time memory and CPU consumption on the single physical GKE Node..."
          kubectl top nodes 2>/dev/null || echo "⚠️ Metrics-Server is disabled on GKE Free Tier. Bypassing node telemetry query safely."
          echo "-------------------------------------------------------------------------"
          
          echo "- Checking memory and CPU consumption across all active app containers..."
          kubectl top pods -n "$K8S_DEPLOYMENT_NAMESPACE" 2>/dev/null || echo "⚠️ Metrics API temporarily unavailable for pods."
          
          echo "-------------------------------------------------------------------------"
          echo "- Analyzing allocation capacity gates (Investigating Insufficient Memory limits)..."
          # Find current Node name and print out allocated resources table 'Allocated resources'
          FIRST_NODE_NAME=$(kubectl get nodes -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ ! -z "$FIRST_NODE_NAME" ]; then
            echo "* Allocated Resource Status for Host Node [$FIRST_NODE_NAME]:"
            kubectl describe node "$FIRST_NODE_NAME" | grep -A 7 -E "Resource.*Requests.*Limits" || true
          fi
          
          # Kill background node process
          echo "--- 1. Cleaning background host processes ---"
          pkill -f node || true
          
          # Clean all container sidecar (Postgres, Redis) and Volume to avoid cache port
          echo "--- 2. Flushing dynamic docker infrastructure ---"
          docker ps -aq | xargs -r docker rm -f || true
          docker volume prune -f || true
          
          # !!!IMPORTANT!!!
          # Use Prisma CLI to clean all data in Database Neon/Postgres Production
          # Help next build to have clean database, not conflicting data
          # Only running if database local (virtual local test).
          # If DATABASE_URL is PRODUCTION (Neon / GCP Cloud SQL), skip to protect Production
          if [[ "$DATABASE_URL" == *"localhost"* || "$DATABASE_URL" == *"127.0.0.1"* ]]; then
            echo "⚠️ - Detected local test database. Running safe purge..."
            npx prisma db purge --force || npx prisma migrate reset --force || true
          else
            echo "🔒 - !!!ATTENTION!!! Detected PRODUCTION Database. Skipping purge to protect live data!"
          fi
          
          # Clean context of K8s and Token GCP on Virtual Runner Machine for security and cache conflicting next build time
          echo "--- 4. Clearing localized Kubernetes context ---"
          rm -rf ~/.kube ~/.config/gcloud || true

