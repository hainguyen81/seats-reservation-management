# -------------------------------------------------
# GUIDELINE: Need to do before deploying to GCP
# -------------------------------------------------
# - Create GCP Provider. Ex: github-seats-reservation
#   - Issuer URL. Ex: https://githubusercontent.com
#   - Allowed audiences. Ex: 1 - https://googleapis.com; 2 - https://iam.googleapis.com (generated by GitHub CI/CD, in GitHub CI/CD console is `//iam.googleapis.com/***`)
#     + Choose `Default audience` first to get the IAM path from URL to pass into GitHub secret as ${{ GCP_WORKLOAD_PROVIDER }}
#       Ex: projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#     + After getting IAM path, choose `Allowed audiences` to input as example
#     + Suggest to choose `Default audience`:
#       Ex: https://iam.googleapis.com/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/providers/<GCP Workload Provider ID/Name>
#   - Add mapping:
#     + Default mapping 1:    google.subject        - OIDC: assertion.sub
#     + Add more mapping 2:   attribute.repository  - OIDC: assertion.repository
#   - Add mapping condition for new mapping attribute 2
#     Ex: assertion.repository == "<GitHub Username>/<GitHub Repository Name>"
# - Grant access permission for IAM Service Accounts (IAM Policy) by Cloud Shell:
#   `--member` parameter pattern:
#     + principalSet://<Allowed audaudience or googleapis.com>/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/<new attribute name. Ex: attribute.repository>/<assertion.repository value. Ex: <GitHub Username>/<GitHub Repository Name>
#   Ex: gcloud iam service-accounts add-iam-policy-binding "<Service Account Email. Ex: github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com>" \
#             --project="<GCP Project Number>" \
#             --role="roles/iam.workloadIdentityUser" \
#             --member="principalSet://<Allowed audaudience or googleapis.com>/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/<new attribute name. Ex: attribute.repository>/<assertion.repository value. Ex: <GitHub Username>/<GitHub Repository Name>"
# - Info:
#   Workfload Identity Pool IAM Principal Pattern:
#     principal://iam.googleapis.com/projects/<GCP Project Number>/locations/global/workloadIdentityPools/<GCP Workload Idenity Pool ID/Name>/subject/SUBJECT_ATTRIBUTE_VALUE
# - Back to GitHub and input the secret GCP_WORKLOAD_PROVIDER value that received from previous steps
# -------------------------------------------------

name: ☁️ [ GKE Deployment ] Seats Reservation Platform CI/CD Pipeline

on:
  # auto trigger workflow
  # push:
  #   branches: [ "master" ] # active when merge code into master
  # pull_request:
  #   branches: [ "master" ]

  # manual trigger workflow
  workflow_dispatch:
    inputs:
      env_data:
        description: "🔧 Environment Variables (JSON)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: |
          [
            {
                "name":     "seats-reservation-sqlite",
                "env_vars": {
                    "K8S_DEPLOYMENT_NAMESPACE":   "gke-seats-reservation-sqlite",
                    "K8S_DEPLOYMENT_NAME":        "seats-reservation-deployment",
                    "K8S_DEPLOYMENT_SERVICE":     "seats-reservation-service-lb",
                    "K8S_DEPLOYMENT":             "./sources/.k8s/k8s-gke-deployment-sqlite.yml"
                }
            },
            {
                "name":     "seats-reservation-postgres",
                "env_vars": {
                    "K8S_DEPLOYMENT_NAMESPACE":   "gke-seats-reservation-postgres",
                    "K8S_DEPLOYMENT_NAME":        "seats-reservation-deployment",
                    "K8S_DEPLOYMENT_SERVICE":     "seats-reservation-service-lb",
                    "K8S_DEPLOYMENT_SECRET":      "seats-reservation-secret",
                    "K8S_DEPLOYMENT":             "./sources/.k8s/k8s-gke-deployment-postgres.yml"
                }
            }
          ]
      region:
        description: "🌍 GCP Region"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: us-central1    # Always Free
      machine_type:
        description: "⚙️ GKE Machine Type (e2-micro, e2-small, e2-medium)"
        required: false         # not require, due to be triggered standalone
        type: string            # receive enviroment from parent workflow under JSON string
        default: e2-micro
      nodes_number:
        description: "⚙️ The number of GKE Machine Node"
        required: false         # not require, due to be triggered standalone
        type: number            # receive enviroment from parent workflow under JSON string
        default: 1

# permissions for GitHub Actions READ/WRITE
permissions:
  contents: read
  packages: write
  id-token: write

# enviroment
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LANG: 'C.UTF-8'
  LC_ALL: 'C.UTF-8'

jobs:
  # ==============================================================================
  # 🌐 GCP DEPLOYMENT
  # ==============================================================================
  deploy-to-gcp:
    name: 🌐 [ GKE ] Deploy to Google Cloud
    runs-on: ubuntu-latest
    # needs: build-and-push-to-docker-hub      # not require test running, due to be triggered standalone
    
    # load services configuraion
    strategy:
      fail-fast: false
      matrix:
        # run parallel threads for services
        service: ${{ fromJson(inputs.env_data) }}

    steps:
      # 1. Check whether allow for running workflow
      - name: 🛡️ Gatekeeper - Validate Administrative Access
        env:
          ALLOW_GKE_DEPLOY: ${{ secrets.ALLOW_GKE_DEPLOY }}
        if: ${{ env.ALLOW_GKE_DEPLOY != 'true' }}
        run: |
          echo "❌ Deployment is administratively DISABLED via GitHub Secrets (secrets.ALLOW_GKE_DEPLOY is not true)."
          echo "Terminating pipeline execution immediately to protect production infrastructure."
          exit 1 # Require Admin Rights
      
      # 2. Check out source code
      - name: ⬇️ Checkout Source Code
        if: success()                 # if previous step is successful
        uses: actions/checkout@v4
      
      # 3. Login to Google Cloud by Google OAuth2 ADC
      - name: 🔑 Authenticate to Google Cloud via Google OAuth2 ADC
        if: success()                 # if previous step is successful
        uses: google-github-actions/auth@v2
        with:
          # authenticate via OIDC
          # workload_identity_provider: "projects/130619617539/locations/global/workloadIdentityPools/github-seats-reservation-pool/providers/github-seats-reservation" # ${{ secrets.GCP_WORKLOAD_PROVIDER }}
          # service_account: "github-seats-reservation@gcp-seats-reservation.iam.gserviceaccount.com" # ${{ secrets.GCP_SERVICE_ACCOUNT }}
          # authenticate via Google OAuth2 ADC JSON
          credentials_json: ${{ secrets.GCP_ADC_JSON }}
          token_format: 'access_token'        # debug token
          access_token_lifetime: '3300s'      # extend time due to be differnt timezone
          create_credentials_file: true       # export credentials for next steps
          export_environment_variables: true  # export enviroment variables for next steps
      
      # require cloud SDK
      - name: 🛠️ Set up Cloud SDK
        if: success()                 # if previous step is successful
        uses: google-github-actions/setup-gcloud@v2
      
      # require docker client to config GCP registry
      - name: 🛠️ Configure Docker Client for GCP Registry
        if: success()                 # if previous step is successful
        run: gcloud auth configure-docker ${{ inputs.region }}-docker.pkg.dev
      
      # ==============================================================================
      # 🌐 !!!IMPORTANT!!! Require to re-build immutable image and push it to GCP Registry, not using the built image from DockerHub because:
      # 1. Pulling Time, Bandwidth and Scaling Cost:
      # - DockerHub: when GKE need to scale up, it must download image from DockerHub to re-scale. This will make cost increasing (egress fees)
      # and make scaling process longer than immutable image
      # - GCP Registry: in same network with GCP Deployment Virtual Server/Network, so it's in same internal network (bandwidth is free, and fastest)
      # 2. Private Network Execution (Strongest Security)
      # 3. The image is immutable via SHA code (github.sha):
      # - DockerHub: if 2 virtual K8s machine pull image at 2 different time, then they could run 2 different versions of code.
      # - GCP SHA: it's only one uniqued SHA version, so GCP K8s virtual machines will run same code version when scaling
      # ==============================================================================
      # 4. Require docker build kit
      - name: 🛠️ Set up Docker Buildx
        if: success()                 # if previous step is successful
        uses: docker/setup-buildx-action@v3
        with:
          # back to use default builder if new instance is error by stucking network
          fallback-to-driver: docker
      
      # 5. Check and create GKE image repository if not existing
      - name: 📦 Ensure Artifact Registry Repository Exists
        if: success()                 # if previous step is successful
        env:
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GKE_REPOSITORY: ${{ github.event.repository.name }}
        run: |
          # request repository information from GCP
          echo "📦 Checking if repository '$GKE_REPOSITORY' exists in region '${{ inputs.region }}'..."
          if ! gcloud artifacts repositories describe "$GKE_REPOSITORY" --location="${{ inputs.region }}" --quiet >/dev/null 2>&1; then
            # invoke creating repository if not found
            echo "⚠️ Repository not found! Initiating automated creation lifecycle..."
            gcloud artifacts repositories create "$GKE_REPOSITORY" \
              --repository-format=docker \
              --location="${{ inputs.region }}" \
              --description="Automated GKE Docker Repository (GitHub Owner: $GITHUB_REPO_OWNER) created via GitHub Actions CI/CD Pipeline" \
              --quiet
            echo "✅ Repository $GKE_REPOSITORY created successfully."
          else
            echo "✅ Repository $GKE_REPOSITORY already exists. Skipping creation phase."
          fi
      
      # 6. Check GKE cluster, if not found, then creating it.
      # !!!IMPORTANT!! Use one cluster for both SQLite/Postgres, so use GitHub repository name to save the cost
      # Requires GCP Kubernetes Engine Admin Rights to create
      - name: 📦 Ensure GKE Cluster Exists (Auto-Provision Hardware)
        if: success()                 # if previous step is successful
        env:
          GKE_CLUSTER: ${{ github.event.repository.name }}-cluster
          GCP_REGION: ${{ inputs.region }}
          GKE_MACHINE_TYPE: ${{ inputs.machine_type }}
          GKE_NODES_NUMBER: ${{ inputs.nodes_number }}
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
        run: |
          CLUSTER_NAME="$GKE_CLUSTER"
          REGION_NAME="$GCP_REGION"
          MACHINE_TYPE="$GKE_MACHINE_TYPE"
          NODES_NUMBER="$GKE_NODES_NUMBER"
          
          echo "========================================================================="
          echo "🕵️‍♂️ AUTOMATICALLY EXTRACTING SERVICE ACCOUNT EMAIL FROM ADC JSON KEY"
          echo "========================================================================="
          # Use Node.js to read file JSON and find "client_email"
          GCP_SA_EMAIL=$(node -e "const data = JSON.parse(process.env.GCP_ADC_JSON); console.log(data.client_email);")
          echo "Checking if physical GKE Cluster '$CLUSTER_NAME' exists in region '$REGION_NAME'. Service Account:  '$GCP_SA_EMAIL'..."
          
          # 1. Check Cluster whether existed on GCP
          if ! gcloud container clusters describe "$CLUSTER_NAME" --region="$REGION_NAME" --quiet >/dev/null 2>&1; then
            echo "⚠️ GKE Cluster '$CLUSTER_NAME' not found! Initiating automated hardware provisioning under Free Tier parameters..."
            
            # ==============================================================================
            # !!!IMPORTANT!!! Free Tier:
            # - Should only use `--machine-type="e2-micro"`, `--num-nodes=1`
            # ==============================================================================
            # 2. Create new Cluster auto by gcloud command
            # - Use flag `--async` to continue CI/CD workflow
            # - Config `e2-micro/e2-small` and `--num-nodes=1` to keep Free Tier, avoid GCP Payment
            gcloud container clusters create "$CLUSTER_NAME" \
                --service-account="$GCP_SA_EMAIL" \
                --region="$REGION_NAME" \
                --num-nodes=$NODES_NUMBER \
                --machine-type="$MACHINE_TYPE" \
                --disk-size="10GB" \
                --enable-autoscaling --min-nodes=1 --max-nodes=2 \
                --async \
                --quiet
            echo "🛸 Hardware creation dispatched. Initiating smart monitoring loop..."
          
            # 2. Smart Wait Loop
            # Loop every 30 seconds to ask GCP whether cluster is 'RUNNING'.
            # to avoid pipeline timeout and other push code requests not stuck by this.
            while true; do
              STATUS=$(gcloud container clusters describe "$CLUSTER_NAME" --region="$REGION_NAME" --format="value(status)" 2>/dev/null || echo "PROVISIONING")
              echo "Current GKE Infrastructure Status: [ $STATUS ]"
              
              if [ "$STATUS" = "RUNNING" ]; then
                echo "✅ GKE Cluster hardware is fully assembled and live! Proceeding to software layer."
                break
              elif [ "$STATUS" = "STOPPING" ] || [ "$STATUS" = "ERROR" ] || [ "$STATUS" = "DEGRADED" ]; then
                echo "❌ GKE Hardware initialization failed with status: $STATUS"
                exit 1
              fi
              
              echo "⚠️ Waiting 30 seconds for Google Cloud infrastructure layer to complete..."
              sleep 30
            done
          else
            echo "❌ Physical GKE Cluster already exists. Proceeding directly to software orchestration layer."
          fi
      
      # 7. Build immutable image and push to GCP Registry
      - name: 🏗️ Build and Push Production Image to GCP Registry
        if: success()                 # if previous step is successful
        uses: docker/build-push-action@v6
        with:
          context: ./sources
          file: ./sources/Dockerfile
          push: true
          # tag image name must follow Google Artifact Registry Standards.
          # Ex: <region>-docker.pkg.dev/<GCP_PROJECT_ID>/<GCP Repository Name>/<Immutable K8s Image Name>:<unique SHA>
          tags: ${{ inputs.region }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ github.event.repository.name }}/${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      # 8. Require GKE credentials to deploy
      - name: 🔑 Require GKE Cluster Credentials
        if: success()                 # if previous step is successful
        uses: google-github-actions/get-gke-credentials@v2
        with:
          # !!!IMPORTANT!! Use one cluster for both SQLite/Postgres, so use GitHub repository name to save the cost
          cluster_name: ${{ github.event.repository.name }}-cluster
          location: ${{ inputs.region }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
      
      # 9. Check GKE Namespace, if not found, then creating it.
      # !!!IMPORTANT!! Use one cluster for both SQLite/Postgres, so use GitHub repository name to save the cost
      # Requires GCP Kubernetes Engine Admin Rights to create
      - name: 📦 Ensure Target Kubernetes Namespace Exists
        if: success()                 # if previous step is successful
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
        run: |
          # Auto check: if not existing, then creating it. Else, skip safe
          echo "Validating infrastructure partition status on GKE cluster..."
          kubectl create namespace $K8S_DEPLOYMENT_NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
      
      # 10. Auto Turn WORKLOAD IDENTITY on GKE if neccessary
      - name: 📦 Ensure Workload Identity is Enabled on Cluster
        if: success()                 # if previous step is successful
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GKE_CLUSTER: ${{ github.event.repository.name }}-cluster
          GCP_SERVICE_REGION: ${{ inputs.region }}
        run: |
          CLUSTER_NAME="${GKE_CLUSTER}"
          REGION_NAME="${GCP_SERVICE_REGION}"
          PROJECT_ID="${GCP_PROJECT_ID}"
          
          echo "Checking Workload Identity status for cluster '$CLUSTER_NAME' | Region '$REGION_NAME | Project '$PROJECT_ID'..."
          
          # check workloadPool configuration on GCP
          POOL_STATUS=$(gcloud container clusters describe "$CLUSTER_NAME" --region="$REGION_NAME" --format="value(workloadPool)" 2>/dev/null || echo "")
          if [ -z "$POOL_STATUS" ] || [ "$POOL_STATUS" = "null" ]; then
            echo "========================================================================="
            echo "⚠️ Workload Identity is disabled on this GKE cluster! Initiating activation..."
            echo "========================================================================="
            
            # 🔥 Smart Loop Watch: request GCP to check cluster whether is busy (STATUS must be RUNNING and have no any PENDING operation)
            echo "- 🕵️‍♂️ 1. MONITORING CLUSTER OPERATION STATUS (PREVENTING CONCURRENCY LOCKS)"
            while true; do
              CURRENT_STATUS=$(gcloud container clusters describe "$CLUSTER_NAME" --region="$REGION_NAME" --format="value(status)" 2>/dev/null || echo "RECONCILING")
              echo "-> Current GKE Control Plane State: [ $CURRENT_STATUS ]"
              
              # Nếu trạng thái báo RUNNING (hoặc rảnh hoàn toàn), thoát khỏi vòng lặp để tiến hành update
              if [ "$CURRENT_STATUS" = "RUNNING" ]; then
                echo "---> ✅ Cluster infrastructure is completely IDLE. Ready for modification policy."
                break
              fi
              
              echo "---> ⚠️ Cluster is currently busy running an external operation. Sleeping 20 seconds..."
              sleep 20
            done
            
            # 1. Activate workload identity pool
            echo "- 🛠️ 2. Update Workload Metadata on the node pools..."
            gcloud container clusters update "$CLUSTER_NAME" \
                --region="$REGION_NAME" \
                --workload-pool="$PROJECT_ID.svc.id.goog" \
                --quiet
            
            # 2. Synchronize metadata configuration to virtual machines (Node Pool)
            # Default is the first pool default-pool.
            echo "- 🛠️ 3. Activating Workload Metadata on the node pools..."
            gcloud container node-pools update default-pool \
                --cluster="$CLUSTER_NAME" \
                --region="$REGION_NAME" \
                --workload-metadata=GKE_METADATA --quiet || true
            
            echo "✅ Workload Identity pool setup successfully completed."
          else
            echo "✅ Workload Identity pool is already active ($POOL_STATUS). Proceeding safely."
          fi
      
      # 10. Bind GKE Service Account for pulling image on GCP Repository
      - name: 🔗 Bind GKE Service Account to Google IAM Role (Workload Identity)
        if: success()                 # if previous step is successful
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
          GCP_ADC_JSON: ${{ secrets.GCP_ADC_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "========================================================================="
          echo "🕵️‍♂️ AUTOMATICALLY EXTRACTING SERVICE ACCOUNT EMAIL FROM ADC JSON KEY"
          echo "========================================================================="
          # Use Node.js to read file JSON and find "client_email"
          GCP_SA_EMAIL=$(node -e "const data = JSON.parse(process.env.GCP_ADC_JSON); console.log(data.client_email);")
          # # debug
          # echo "- Detected Identity Email: $GCP_SA_EMAIL | Namespace: $K8S_DEPLOYMENT_NAMESPACE"
          
          echo "========================================================================="
          echo "🛠️ CREATING KUBERNETES SERVICE ACCOUNT OBJECT"
          echo "========================================================================="
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: gcp-service-account-runner
            namespace: $K8S_DEPLOYMENT_NAMESPACE
            annotations:
              iam.gke.io/gcp-service-account: $GCP_SA_EMAIL
          EOF
          # # debug
          # echo "--- Content Verified ---"
          # cat <<EOF
          # apiVersion: v1
          # kind: ServiceAccount
          # metadata:
          #   name: gcp-service-account-runner
          #   namespace: $K8S_DEPLOYMENT_NAMESPACE
          #   annotations:
          #     iam.gke.io/gcp-service-account: $GCP_SA_EMAIL
          # EOF
          
          echo "========================================================================="
          echo "🔐 EXECUTING WORKLOAD IDENTITY BINDING VIA DYNAMIC ADC CREDENTIALS"
          echo "========================================================================="
          # Load $GCP_SA_EMAIL to gcloud
          gcloud iam service-accounts add-iam-policy-binding "$GCP_SA_EMAIL" \
              --role="roles/iam.workloadIdentityUser" \
              --member="serviceAccount:${GCP_PROJECT_ID}.svc.id.goog[${K8S_DEPLOYMENT_NAMESPACE}/gcp-service-account-runner]" \
              --project="${GCP_PROJECT_ID}" \
              --quiet

      # 11. Create secret to adapt into K8s deployment
      - name: 🔐 Securely Create and Override GKE Database Secrets
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
          K8S_DEPLOYMENT_SECRET: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_SECRET }}
        if: success() && env.K8S_DEPLOYMENT_SECRET != null && env.K8S_DEPLOYMENT_SECRET != ''    # if previous step is successful
        run: |
          echo "========================================================================="
          echo "🔒 GENERATING IMMUTABLE KUBERNETES SECRETS WITH AUTOMATIC OVERRIDE"
          echo "========================================================================="
          
          # Use `--dry-run=client -o yaml | kubectl apply -f -`
          # to help auto updating (Upsert) new value from GitHub Secrets to GKE
          kubectl create secret generic $K8S_DEPLOYMENT_SECRET \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL_NEON_POSTGRES }}" \
            --from-literal=DIRECT_DATABASE_URL="${{ secrets.DIRECT_DATABASE_URL_NEON_POSTGRES }}" \
            --dry-run=client -o yaml | kubectl apply -f - -n $K8S_DEPLOYMENT_NAMESPACE
      
      # 12. Deploy to Google Cloud Run GKE by built image
      - name: 🌐 Dynamically Update Kubernetes Context & Deploy
        if: success()                 # if previous step is successful
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE: ${{ matrix.service.name }}
          GCP_SERVICE_REGION: ${{ inputs.region }}
          GKE_DEPLOYMENT_FILE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT }}
          IMAGE_SHA: ${{ github.sha }}
        run: |
          echo "========================================================================="
          echo "🧹 STEP 1: PURGING STALE CACHED DEPLOYMENTS FROM GKE INFRASTRUCTURE"
          echo "========================================================================="
          # 🔥 delete old deployment to avoid cache out of namespace
          kubectl delete deployment seats-reservation-deployment -n ${{ matrix.service.namespace }} --ignore-not-found=true || true
          
          echo "========================================================================="
          echo "🔄 STEP 2: INJECTING DYNAMIC REGISTRY PATH INTO MANIFEST"
          echo "========================================================================="
          # fix k8s deployment image yml file by region
          sed -i "s|PLACEHOLDER_GKE_REGISTRY_IMAGE|${GCP_SERVICE_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GCP_SERVICE}:${IMAGE_SHA}|g" $GKE_DEPLOYMENT_FILE
          # fix k8s deployment service account runner yml file for pulling image when deploying
          sed -i "s|PLACEHOLDER_GCP_SERVICE_ACCOUNT_RUNNER|gcp-service-account-runner|g" $GKE_DEPLOYMENT_FILE
          # # debug
          # cat $GKE_DEPLOYMENT_FILE
          
          echo "========================================================================="
          echo "🚀 STEP 3: APPLYING FRESH IMMUTABLE MANIFEST TO GKE CLUSTER"
          echo "========================================================================="
          kubectl apply -f $GKE_DEPLOYMENT_FILE --force
      
      # 13. Check deployment status
      - name: 📊 Check Rollout Status & Extract Deployment Metadata
        if: success()                 # if previous step is successful
        env:
          K8S_DEPLOYMENT_NAMESPACE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAMESPACE }}
          K8S_DEPLOYMENT_NAME: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_NAME }}
          K8S_DEPLOYMENT_SERVICE: ${{ matrix.service.env_vars.K8S_DEPLOYMENT_SERVICE }}
        run: |
          echo "========================================================================="
          echo "🚀 1. MONITORING KUBERNETES ROLLING UPDATE STATUS"
          echo "========================================================================="
          # Force CI/CD wait until GKE Pods running successful
          # If having error (CrashLoopBackOff, ImagePullBackOff), this line will show error and stop pipeline (Fail-Fast)
          if ! kubectl rollout status deployment/$K8S_DEPLOYMENT_NAME -n $K8S_DEPLOYMENT_NAMESPACE --timeout=150s; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Rollout Status] before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "📦 2. CURRENT RUNNING PODS & CONTAINER STATUS"
          echo "========================================================================="
          # Print to trace running pods, number of instances (Replicas) and status
          if ! kubectl get pods -l app=$K8S_DEPLOYMENT_NAME -o wide -n $K8S_DEPLOYMENT_NAMESPACE; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Pods] before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "🌐 3. EXTRACTING NETWORK ENDPOINTS (EXTERNAL IP & SERVICE PORTS)"
          echo "========================================================================="
          # Request public information (IP, access port)
          if ! kubectl get service $K8S_DEPLOYMENT_SERVICE -n $K8S_DEPLOYMENT_NAMESPACE; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Service] $K8S_DEPLOYMENT_SERVICE (namespace=$K8S_DEPLOYMENT_NAMESPACE) before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "📜 4. STREAMING LIVE APPLICATION BOOT LOGS"
          echo "========================================================================="
          # Print first 50 lines when container started
          # to check whether application start successful
          if ! kubectl logs deployment/$K8S_DEPLOYMENT_NAME --tail=50 --all-containers=true -n $K8S_DEPLOYMENT_NAMESPACE; then
            # 🔥 Show as Step Warning on GITHUB CI/CD UI
            echo "::warning::⚠️ Could not reach [GKE Logs] deployment/$K8S_DEPLOYMENT_NAME (namespace=$K8S_DEPLOYMENT_NAMESPACE) before completion. Pods might still be initializing in the background."
            echo "Bypassing hard error check to prevent pipeline failure."
          fi
          
          echo "========================================================================="
          echo "📜 5. CALCULATE THE GKE PUBLIC URL"
          echo "========================================================================="
          # Calculate if after 60 seconds, and could not get the external IP (Ex: GKE Hardware Stuck)
          if [ -z "$EXTERNAL_IP" ] || [ "$EXTERNAL_IP" == "<pending>" ]; then
            echo "::warning::⚠️ GCP LoadBalancer failed to allocate a public IP within 60s. Skipping clickable link generation."
          
          else
            # Extract Public Port of Service
            SERVICE_PORT=$(kubectl get svc $K8S_DEPLOYMENT_SERVICE -n $K8S_DEPLOYMENT_NAMESPACE -o jsonpath='{.spec.ports[0].port}' 2>/dev/null || echo "3000")
            
            # Calculate the public URL
            PUBLIC_URL="http://${EXTERNAL_IP}:${SERVICE_PORT}"
            echo "✅ Production-Ready Live Link Calculated: $PUBLIC_URL"
            
            # 🎯 Mẹo in thông báo nổi bật màu xanh lá cây bấm được ngay tại trang log chính
            echo "::notice title=💡 Deployment Live Endpoint::Your application is running smoothly at: $PUBLIC_URL"
            
            # 🎯 Mẹo viết bảng báo cáo ra màn hình Summary bên ngoài GitHub UI để nhà tuyển dụng dễ click
            echo "### 💡 Live Deployment Metadata Info" >> $GITHUB_STEP_SUMMARY
            echo "* **Matrix Target Name:** \`${{ matrix.service.name }}\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Kubernetes Room (Namespace):** \`$K8S_DEPLOYMENT_NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Clickable Production Endpoint Link:** [$PUBLIC_URL]($PUBLIC_URL)" >> $GITHUB_STEP_SUMMARY
          fi
      
      # 14. Clean up
      - name: ⚙️ Force Kill Orphan Processes
        if: always()    # Always run to clean up
        run: |
          # Kill background node process
          echo "--- 1. Cleaning background host processes ---"
          pkill -f node || true
          
          # Clean all container sidecar (Postgres, Redis) and Volume to avoid cache port
          echo "--- 2. Flushing dynamic docker infrastructure ---"
          docker ps -aq | xargs -r docker rm -f || true
          docker volume prune -f || true
          
          # !!!IMPORTANT!!!
          # Use Prisma CLI to clean all data in Database Neon/Postgres Production
          # Help next build to have clean database, not conflicting data
          # Only running if database local (virtual local test).
          # If DATABASE_URL is PRODUCTION (Neon / GCP Cloud SQL), skip to protect Production
          if [[ "$DATABASE_URL" == *"localhost"* || "$DATABASE_URL" == *"127.0.0.1"* ]]; then
            echo "⚠️ - Detected local test database. Running safe purge..."
            npx prisma db purge --force || npx prisma migrate reset --force || true
          else
            echo "🔒 - !!!ATTENTION!!! Detected PRODUCTION Database. Skipping purge to protect live data!"
          fi
          
          # Clean context of K8s and Token GCP on Virtual Runner Machine for security and cache conflicting next build time
          echo "--- 4. Clearing localized Kubernetes context ---"
          rm -rf ~/.kube ~/.config/gcloud || true
          rm -f k8s-deployment.yaml || true

